<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>超好玩粒子画布</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
}
html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: "Microsoft YaHei", system-ui, sans-serif;
}
#canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #0a0a10;
    z-index: 0;
}

/* 折叠开关按钮 */
#toggle-btn {
    position: fixed;
    top: 15px;
    right: 15px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: rgba(20,20,35,0.9);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 999;
    cursor: pointer;
    transition: all 0.2s ease;
}
#toggle-btn:active {
    transform: scale(0.9);
}

/* 控制面板 - 手机端优化 */
#control-panel {
    position: fixed;
    top: 15px;
    right: 15px;
    width: 85vw;
    max-width: 320px;
    min-width: 220px;
    min-height: 120px;
    max-height: 85vh;
    background: rgba(20, 20, 35, 0.95);
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    z-index: 998;
    color: #fff;
    display: none;
    flex-direction: column;
    overflow: hidden;
    touch-action: none;
}
#control-panel.show {
    display: flex;
}
#control-panel.locked .panel-header {
    pointer-events: none;
}
#control-panel.locked #resize-handle {
    display: none;
}

/* 拖动标题栏 */
.panel-header {
    padding: 12px 16px;
    background: rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: move;
    user-select: none;
}
.panel-title {
    font-size: 16px;
    font-weight: 700;
    color: #f0f0ff;
}
.header-actions {
    display: flex;
    gap: 8px;
}
.lock-btn, .close-btn {
    width: 32px;
    height: 32px;
    border-radius: 6px;
    background: rgba(255,255,255,0.08);
    border: none;
    color: #d0d0e0;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s ease;
}
.lock-btn.active {
    color: #a878ff;
    background: rgba(168, 120, 255, 0.2);
}

/* 面板内容区 */
.panel-content {
    flex: 1;
    padding: 12px 16px;
    overflow-y: auto;
}
.panel-content::-webkit-scrollbar {
    width: 4px;
}
.panel-content::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.2);
    border-radius: 2px;
}

/* 分区标题 */
.section-title {
    font-size: 13px;
    font-weight: 700;
    color: #a0a0b0;
    margin: 16px 0 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}
.section-title:first-child {
    margin-top: 0;
}

/* 模式按钮 - 3列紧凑布局 */
.mode-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    margin-bottom: 8px;
}
.mode-btn {
    padding: 7px 0;
    border-radius: 6px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    color: #d0d0e0;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
    text-align: center;
}
.mode-btn.active {
    background: linear-gradient(135deg, #a878ff, #58a8ff);
    color: #fff;
    border-color: transparent;
}
.mode-btn:active {
    transform: scale(0.95);
}

/* 预设效果按钮 */
.preset-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-bottom: 8px;
}
.preset-btn {
    padding: 8px 0;
    border-radius: 6px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    color: #d0d0e0;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
    text-align: center;
}
.preset-btn:active {
    transform: scale(0.95);
    background: rgba(168, 120, 255, 0.2);
    border-color: #a878ff;
}

/* 开关控件 */
.switch-group {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
}
.switch-label {
    font-size: 13px;
    color: #d0d0e0;
}
.switch {
    position: relative;
    width: 44px;
    height: 24px;
    border-radius: 12px;
    background: rgba(255,255,255,0.1);
    cursor: pointer;
    transition: all 0.2s ease;
}
.switch.active {
    background: linear-gradient(135deg, #a878ff, #58a8ff);
}
.switch-thumb {
    position: absolute;
    top: 3px;
    left: 3px;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: #fff;
    transition: all 0.2s ease;
}
.switch.active .switch-thumb {
    transform: translateX(20px);
}

/* 选择控件 */
.select-group {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
}
.select-label {
    font-size: 13px;
    color: #d0d0e0;
}
.select {
    padding: 6px 10px;
    border-radius: 6px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
    font-size: 12px;
    outline: none;
}

/* 滑块控件 - 手机端触控优化 */
.control-group {
    margin-bottom: 12px;
}
.control-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #d0d0e0;
    margin-bottom: 6px;
}
.control-value {
    color: #a878ff;
    font-weight: 600;
}
.slider {
    width: 100%;
    height: 8px;
    border-radius: 4px;
    background: rgba(255,255,255,0.1);
    outline: none;
    -webkit-appearance: none;
    cursor: pointer;
}
.slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: linear-gradient(135deg, #a878ff, #58a8ff);
    cursor: pointer;
}
.slider::-moz-range-thumb {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: linear-gradient(135deg, #a878ff, #58a8ff);
    border: none;
    cursor: pointer;
}

/* 颜色选择组 */
.color-group {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
}
.color-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
}
.color-label {
    font-size: 11px;
    color: #d0d0e0;
}
.color-picker {
    width: 100%;
    height: 32px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    background: none;
    cursor: pointer;
}

/* 操作按钮 */
.action-buttons {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin: 16px 0 8px;
}
.btn {
    width: 100%;
    padding: 10px 0;
    border-radius: 8px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    user-select: none;
}
.btn-primary {
    background: linear-gradient(135deg, #a878ff, #58a8ff);
    color: #fff;
    grid-column: span 2;
}
.btn-secondary {
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
}
.btn-danger {
    background: rgba(239, 68, 68, 0.2);
    border: 1px solid rgba(239, 68, 68, 0.4);
    color: #fca5a5;
}
.btn:active {
    transform: scale(0.95);
}

/* 缩放手柄 */
.resize-handle {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 20px;
    height: 20px;
    cursor: nwse-resize;
    z-index: 10;
}
.resize-handle::after {
    content: '';
    position: absolute;
    bottom: 4px;
    left: 4px;
    width: 12px;
    height: 12px;
    border-left: 2px solid rgba(255,255,255,0.3);
    border-bottom: 2px solid rgba(255,255,255,0.3);
    border-radius: 0 0 0 2px;
}

/* 信息栏 - 手机端紧凑优化 */
.info-bar {
    position: fixed;
    bottom: 15px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 30px);
    max-width: 400px;
    background: rgba(20,20,35,0.9);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 8px 16px;
    display: flex;
    justify-content: space-between;
    z-index: 10;
}
.info-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    color: #fff;
}
.info-name {
    font-size: 10px;
    color: #a0a0b0;
}
.info-num {
    font-size: 14px;
    font-weight: 700;
    color: #a878ff;
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<!-- 折叠开关 -->
<button id="toggle-btn">⚙️</button>

<!-- 可拖动可缩放控制面板 -->
<div id="control-panel">
    <div class="panel-header" id="drag-handle">
        <span class="panel-title">粒子控制</span>
        <div class="header-actions">
            <button class="lock-btn" id="lock-btn" title="锁定面板">🔒</button>
            <button class="close-btn" id="close-panel">×</button>
        </div>
    </div>
    <div class="panel-content">
        <!-- 核心模式 -->
        <div class="section-title">运动模式</div>
        <div class="mode-buttons">
            <button class="mode-btn active" data-mode="follow">跟随鼠标</button>
            <button class="mode-btn" data-mode="repel">鼠标排斥</button>
            <button class="mode-btn" data-mode="gravity">引力模式</button>
            <button class="mode-btn" data-mode="random">随机流动</button>
            <button class="mode-btn" data-mode="swirl">漩涡模式</button>
            <button class="mode-btn" data-mode="firework">烟花模式</button>
            <button class="mode-btn" data-mode="ripple">涟漪模式</button>
            <button class="mode-btn" data-mode="grid">点阵模式</button>
            <button class="mode-btn" data-mode="draw">画笔模式</button>
        </div>

        <!-- 一键预设 -->
        <div class="section-title">一键预设</div>
        <div class="preset-buttons">
            <button class="preset-btn" data-preset="cyber">赛博霓虹</button>
            <button class="preset-btn" data-preset="star">星空银河</button>
            <button class="preset-btn" data-preset="dream">梦幻紫粉</button>
            <button class="preset-btn" data-preset="fire">火焰红橙</button>
            <button class="preset-btn" data-preset="ice">冰蓝冷调</button>
            <button class="preset-btn" data-preset="rainbow">彩虹渐变</button>
        </div>

        <!-- 基础开关 -->
        <div class="section-title">基础开关</div>
        <div class="switch-group">
            <span class="switch-label">显示粒子连线</span>
            <div class="switch active" id="line-switch">
                <div class="switch-thumb"></div>
            </div>
        </div>
        <div class="switch-group">
            <span class="switch-label">长按爆炸效果</span>
            <div class="switch" id="boom-switch">
                <div class="switch-thumb"></div>
            </div>
        </div>
        <div class="switch-group">
            <span class="switch-label">透明背景</span>
            <div class="switch" id="transparent-switch">
                <div class="switch-thumb"></div>
            </div>
        </div>

        <!-- 样式选择 -->
        <div class="section-title">样式设置</div>
        <div class="select-group">
            <span class="select-label">粒子形状</span>
            <select class="select" id="shape-select">
                <option value="circle">圆形</option>
                <option value="square">方形</option>
                <option value="triangle">三角形</option>
                <option value="star">星形</option>
                <option value="heart">心形</option>
            </select>
        </div>
        <div class="select-group">
            <span class="select-label">连线样式</span>
            <select class="select" id="line-style-select">
                <option value="solid">实线</option>
                <option value="dashed">虚线</option>
                <option value="gradient">渐变线</option>
            </select>
        </div>

        <!-- 颜色设置 -->
        <div class="section-title">颜色设置</div>
        <div class="color-group">
            <div class="color-item">
                <span class="color-label">主颜色</span>
                <input type="color" class="color-picker" id="color1" value="#a878ff">
            </div>
            <div class="color-item">
                <span class="color-label">副颜色</span>
                <input type="color" class="color-picker" id="color2" value="#58a8ff">
            </div>
            <div class="color-item">
                <span class="color-label">背景色</span>
                <input type="color" class="color-picker" id="bg-color" value="#0a0a10">
            </div>
        </div>

        <!-- 核心参数滑块 -->
        <div class="section-title">核心参数</div>
        <div class="control-group">
            <label class="control-label">
                <span>粒子数量</span>
                <span class="control-value" id="count-num">500</span>
            </label>
            <input type="range" class="slider" id="count-slider" min="50" max="2000" value="500" step="50">
        </div>
        <div class="control-group">
            <label class="control-label">
                <span>粒子大小</span>
                <span class="control-value" id="size-num">2</span>
            </label>
            <input type="range" class="slider" id="size-slider" min="0.5" max="8" value="2" step="0.5">
        </div>
        <div class="control-group">
            <label class="control-label">
                <span>移动速度</span>
                <span class="control-value" id="speed-num">1</span>
            </label>
            <input type="range" class="slider" id="speed-slider" min="0.1" max="5" value="1" step="0.1">
        </div>
        <div class="control-group">
            <label class="control-label">
                <span>拖尾长度</span>
                <span class="control-value" id="trail-num">0.15</span>
            </label>
            <input type="range" class="slider" id="trail-slider" min="0" max="0.6" value="0.15" step="0.01">
        </div>
        <div class="control-group">
            <label class="control-label">
                <span>粒子生命周期</span>
                <span class="control-value" id="life-num">3</span>
            </label>
            <input type="range" class="slider" id="life-slider" min="0.5" max="10" value="3" step="0.5">
        </div>
        <div class="control-group">
            <label class="control-label">
                <span>连线最大距离</span>
                <span class="control-value" id="line-num">100</span>
            </label>
            <input type="range" class="slider" id="line-slider" min="30" max="250" value="100" step="10">
        </div>
        <div class="control-group">
            <label class="control-label">
                <span>连线宽度</span>
                <span class="control-value" id="line-width-num">0.5</span>
            </label>
            <input type="range" class="slider" id="line-width-slider" min="0.1" max="3" value="0.5" step="0.1">
        </div>

        <!-- 操作按钮 -->
        <div class="action-buttons">
            <button class="btn btn-secondary" id="random-btn">随机参数</button>
            <button class="btn btn-secondary" id="pause-btn">暂停动画</button>
            <button class="btn btn-secondary" id="clear-btn">清空画布</button>
            <button class="btn btn-danger" id="reset-btn">重置默认</button>
            <button class="btn btn-primary" id="save-btn">保存高清图片</button>
        </div>
    </div>
    <div class="resize-handle" id="resize-handle"></div>
</div>

<!-- 信息栏 -->
<div class="info-bar">
    <div class="info-item">
        <span class="info-name">帧率</span>
        <span class="info-num" id="fps">60</span>
    </div>
    <div class="info-item">
        <span class="info-name">粒子数</span>
        <span class="info-num" id="total">500</span>
    </div>
    <div class="info-item">
        <span class="info-name">X坐标</span>
        <span class="info-num" id="mouse-x">0</span>
    </div>
    <div class="info-item">
        <span class="info-name">Y坐标</span>
        <span class="info-num" id="mouse-y">0</span>
    </div>
</div>

<script>
// 画布初始化
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let width = window.innerWidth;
let height = window.innerHeight;
canvas.width = width;
canvas.height = height;

// 全局参数
let particles = [];
let mouse = {
    x: width / 2,
    y: height / 2,
    down: false,
    lastX: width / 2,
    lastY: width / 2
};
let currentMode = 'follow';
let isPaused = false;
let showLines = true;
let enableBoom = false;
let transparentBg = false;
let currentShape = 'circle';
let currentLineStyle = 'gradient';
let boomCount = 0;

let settings = {
    count: 500,
    size: 2,
    speed: 1,
    trail: 0.15,
    life: 3,
    lineDistance: 100,
    lineWidth: 0.5,
    color1: '#a878ff',
    color2: '#58a8ff',
    bgColor: '#0a0a10'
};

// 预设配置
const presets = {
    cyber: {
        count: 800,
        size: 1.5,
        speed: 1.2,
        trail: 0.1,
        life: 4,
        lineDistance: 120,
        lineWidth: 0.5,
        color1: '#00ffff',
        color2: '#ff00ff',
        bgColor: '#050508'
    },
    star: {
        count: 1500,
        size: 1,
        speed: 0.3,
        trail: 0.05,
        life: 10,
        lineDistance: 50,
        lineWidth: 0.2,
        color1: '#ffffff',
        color2: '#88aaff',
        bgColor: '#020210'
    },
    dream: {
        count: 600,
        size: 3,
        speed: 0.8,
        trail: 0.2,
        life: 5,
        lineDistance: 150,
        lineWidth: 0.8,
        color1: '#ff88cc',
        color2: '#aa66ff',
        bgColor: '#100515'
    },
    fire: {
        count: 1000,
        size: 2,
        speed: 1.5,
        trail: 0.12,
        life: 2,
        lineDistance: 80,
        lineWidth: 0.4,
        color1: '#ff4400',
        color2: '#ffcc00',
        bgColor: '#100505'
    },
    ice: {
        count: 700,
        size: 2,
        speed: 0.7,
        trail: 0.18,
        life: 6,
        lineDistance: 130,
        lineWidth: 0.6,
        color1: '#00ccff',
        color2: '#0066ff',
        bgColor: '#050a15'
    },
    rainbow: {
        count: 1200,
        size: 2.5,
        speed: 1,
        trail: 0.1,
        life: 4,
        lineDistance: 100,
        lineWidth: 0.5,
        color1: '#ff0080',
        color2: '#00ffff',
        bgColor: '#080810'
    }
};

// 帧率统计
let lastTime = performance.now();
let frameCount = 0;
let fps = 60;

// 粒子类
class Particle {
    constructor(isDraw = false, x = 0, y = 0) {
        this.isDraw = isDraw;
        this.reset(x, y);
    }

    reset(x = null, y = null) {
        this.x = x !== null ? x : Math.random() * width;
        this.y = y !== null ? y : Math.random() * height;
        this.vx = (Math.random() - 0.5) * 2 * settings.speed;
        this.vy = (Math.random() - 0.5) * 2 * settings.speed;
        this.life = Math.random();
        this.maxLife = settings.life;
        this.alpha = 1;
        this.size = settings.size * (0.8 + Math.random() * 0.4);
        this.angle = Math.random() * Math.PI * 2;
        this.rotationSpeed = (Math.random() - 0.5) * 0.1;
    }

    update(delta) {
        if (isPaused) return;
        this.life += delta * 0.1;
        this.angle += this.rotationSpeed;

        // 生命周期结束重置
        if (this.life > this.maxLife) {
            if (this.isDraw) {
                this.alpha = 0;
                return;
            }
            this.reset();
        }

        // 透明度计算
        this.alpha = 1 - (this.life / this.maxLife);
        if (this.alpha < 0) this.alpha = 0;

        const dx = mouse.x - this.x;
        const dy = mouse.y - this.y;
        const dist = Math.sqrt(dx * dx + dy * dy);

        // 不同模式的运动逻辑
        switch(currentMode) {
            case 'follow':
                if (dist < 250) {
                    const force = (250 - dist) / 250 * settings.speed * 0.6;
                    this.vx += dx / dist * force * delta * 60;
                    this.vy += dy / dist * force * delta * 60;
                }
                this.vx *= 0.98;
                this.vy *= 0.98;
                break;
            case 'repel':
                if (dist < 200) {
                    const force = (200 - dist) / 200 * settings.speed * 0.8;
                    this.vx -= dx / dist * force * delta * 60;
                    this.vy -= dy / dist * force * delta * 60;
                }
                this.vx *= 0.99;
                this.vy *= 0.99;
                break;
            case 'gravity':
                if (mouse.down && dist < 400) {
                    const force = settings.speed * 0.5;
                    this.vx += dx / dist * force * delta * 60;
                    this.vy += dy / dist * force * delta * 60;
                }
                this.vx *= 0.995;
                this.vy *= 0.995;
                break;
            case 'random':
                const noiseAngle = Math.sin(this.x * 0.002 + this.y * 0.002 + performance.now() * 0.0005) * Math.PI * 2;
                this.vx += Math.cos(noiseAngle) * 0.02 * settings.speed;
                this.vy += Math.sin(noiseAngle) * 0.02 * settings.speed;
                this.vx *= 0.98;
                this.vy *= 0.98;
                break;
            case 'swirl':
                const angle = Math.atan2(dy, dx);
                const swirlForce = dist < 300 ? (300 - dist) / 300 * settings.speed * 0.8 : 0;
                this.vx += Math.cos(angle + Math.PI/2) * swirlForce * delta * 60;
                this.vy += Math.sin(angle + Math.PI/2) * swirlForce * delta * 60;
                if (mouse.down && dist < 300) {
                    this.vx += dx / dist * swirlForce * 0.5 * delta * 60;
                    this.vy += dy / dist * swirlForce * 0.5 * delta * 60;
                }
                this.vx *= 0.99;
                this.vy *= 0.99;
                break;
            case 'firework':
                this.vy += 0.05 * settings.speed;
                if (this.y > height + 20) this.reset();
                if (dist < 150 && mouse.down) {
                    const force = (150 - dist) / 150 * settings.speed * 0.5;
                    this.vx -= dx / dist * force * delta * 60;
                    this.vy -= dy / dist * force * delta * 60;
                }
                break;
            case 'ripple':
                const rippleDist = Math.abs(dist - 100);
                if (rippleDist < 100) {
                    const force = (100 - rippleDist) / 100 * settings.speed * 0.5;
                    const dirX = dx / dist;
                    const dirY = dy / dist;
                    this.vx += dirX * force * delta * 60 * (dist > 100 ? 1 : -1);
                    this.vy += dirY * force * delta * 60 * (dist > 100 ? 1 : -1);
                }
                this.vx *= 0.97;
                this.vy *= 0.97;
                break;
            case 'grid':
                const gridSize = 60;
                const targetX = Math.round(this.x / gridSize) * gridSize;
                const targetY = Math.round(this.y / gridSize) * gridSize;
                this.vx += (targetX - this.x) * 0.01 * settings.speed;
                this.vy += (targetY - this.y) * 0.01 * settings.speed;
                if (dist < 150) {
                    const force = (150 - dist) / 150 * settings.speed * 0.5;
                    this.vx -= dx / dist * force * delta * 60;
                    this.vy -= dy / dist * force * delta * 60;
                }
                this.vx *= 0.95;
                this.vy *= 0.95;
                break;
            case 'draw':
                this.vx *= 0.95;
                this.vy *= 0.95;
                break;
        }

        // 更新位置
        this.x += this.vx * delta * 60;
        this.y += this.vy * delta * 60;

        // 边界处理
        if (currentMode !== 'firework') {
            if (this.x < 0) this.x = width;
            if (this.x > width) this.x = 0;
            if (this.y < 0) this.y = height;
            if (this.y > height) this.y = 0;
        }
    }

    draw() {
        if (this.alpha <= 0) return;
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);

        const size = this.size;
        ctx.beginPath();

        // 不同形状绘制
        switch(currentShape) {
            case 'circle':
                ctx.arc(0, 0, size, 0, Math.PI * 2);
                break;
            case 'square':
                ctx.rect(-size, -size, size * 2, size * 2);
                break;
            case 'triangle':
                ctx.moveTo(0, -size);
                ctx.lineTo(size, size);
                ctx.lineTo(-size, size);
                ctx.closePath();
                break;
            case 'star':
                const spikes = 5;
                let outerRadius = size;
                let innerRadius = size * 0.5;
                let rot = Math.PI / 2 * 3;
                let step = Math.PI / spikes;
                for (let i = 0; i < spikes; i++) {
                    ctx.lineTo(Math.cos(rot) * outerRadius, Math.sin(rot) * outerRadius);
                    rot += step;
                    ctx.lineTo(Math.cos(rot) * innerRadius, Math.sin(rot) * innerRadius);
                    rot += step;
                }
                ctx.closePath();
                break;
            case 'heart':
                const hSize = size * 0.8;
                ctx.moveTo(0, hSize * 0.5);
                ctx.bezierCurveTo(-hSize, -hSize * 0.5, -hSize * 2, hSize * 0.3, 0, hSize * 1.5);
                ctx.bezierCurveTo(hSize * 2, hSize * 0.3, hSize, -hSize * 0.5, 0, hSize * 0.5);
                break;
        }

        const gradient = ctx.createRadialGradient(0, 0, 0, 0, 0, size);
        gradient.addColorStop(0, settings.color1);
        gradient.addColorStop(1, settings.color2 + '00');
        ctx.fillStyle = gradient;
        ctx.fill();
        ctx.restore();
    }
}

// 初始化粒子
function initParticles(clear = true) {
    if (clear) particles = [];
    for (let i = 0; i < settings.count; i++) {
        particles.push(new Particle());
    }
    document.getElementById('total').textContent = settings.count;
}

// 绘制连线
function drawLines() {
    if (!showLines) return;
    ctx.save();

    // 连线样式
    if (currentLineStyle === 'dashed') {
        ctx.setLineDash([5, 5]);
    } else {
        ctx.setLineDash([]);
    }

    for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
            const p1 = particles[i];
            const p2 = particles[j];
            const dx = p1.x - p2.x;
            const dy = p1.y - p2.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist < settings.lineDistance) {
                const alpha = (1 - (dist / settings.lineDistance)) * p1.alpha * p2.alpha;
                if (alpha <= 0) continue;

                ctx.beginPath();
                ctx.moveTo(p1.x, p1.y);
                ctx.lineTo(p2.x, p2.y);

                if (currentLineStyle === 'gradient') {
                    const lineGradient = ctx.createLinearGradient(p1.x, p1.y, p2.x, p2.y);
                    lineGradient.addColorStop(0, settings.color1 + Math.floor(alpha * 255).toString(16).padStart(2, '0'));
                    lineGradient.addColorStop(1, settings.color2 + Math.floor(alpha * 255).toString(16).padStart(2, '0'));
                    ctx.strokeStyle = lineGradient;
                } else {
                    ctx.strokeStyle = settings.color1 + Math.floor(alpha * 255).toString(16).padStart(2, '0');
                }
                
                ctx.lineWidth = settings.lineWidth;
                ctx.stroke();
            }
        }
    }
    ctx.restore();
}

// 爆炸效果
function createBoom(x, y) {
    for (let i = 0; i < 50; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 5 * settings.speed;
        const p = new Particle();
        p.x = x;
        p.y = y;
        p.vx = Math.cos(angle) * speed;
        p.vy = Math.sin(angle) * speed;
        p.life = 0;
        p.maxLife = 2;
        particles.push(p);
    }
    boomCount++;
    if (boomCount > 1000) {
        particles = particles.slice(-2000);
        boomCount = 0;
    }
}

// 动画循环
function animate(time) {
    const delta = (time - lastTime) / 1000;
    lastTime = time;

    // 帧率计算
    frameCount++;
    if (frameCount % 10 === 0) {
        fps = Math.round(1 / delta);
        document.getElementById('fps').textContent = fps;
    }

    // 绘制背景
    if (!transparentBg) {
        ctx.fillStyle = `rgba(${hexToRgb(settings.bgColor)}, ${settings.trail})`;
    } else {
        ctx.clearRect(0, 0, width, height);
    }
    ctx.fillRect(0, 0, width, height);

    // 更新和绘制粒子
    particles.forEach(p => {
        p.update(delta);
        p.draw();
    });

    // 绘制连线
    drawLines();

    // 长按爆炸
    if (mouse.down && enableBoom && frameCount % 3 === 0) {
        createBoom(mouse.x, mouse.y);
    }

    // 画笔模式
    if (currentMode === 'draw' && mouse.down && frameCount % 2 === 0) {
        const dist = Math.sqrt(Math.pow(mouse.x - mouse.lastX, 2) + Math.pow(mouse.y - mouse.lastY, 2));
        if (dist > 5) {
            particles.push(new Particle(true, mouse.x, mouse.y));
            mouse.lastX = mouse.x;
            mouse.lastY = mouse.y;
        }
    }

    requestAnimationFrame(animate);
}

// 十六进制转RGB
function hexToRgb(hex) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return `${r}, ${g}, ${b}`;
}

// 面板折叠/展开
const toggleBtn = document.getElementById('toggle-btn');
const controlPanel = document.getElementById('control-panel');
const closePanelBtn = document.getElementById('close-panel');
const lockBtn = document.getElementById('lock-btn');
let isPanelLocked = false;

toggleBtn.addEventListener('click', () => {
    controlPanel.classList.toggle('show');
});
closePanelBtn.addEventListener('click', () => {
    controlPanel.classList.remove('show');
});
lockBtn.addEventListener('click', () => {
    isPanelLocked = !isPanelLocked;
    lockBtn.classList.toggle('active', isPanelLocked);
    controlPanel.classList.toggle('locked', isPanelLocked);
    lockBtn.textContent = isPanelLocked ? '🔓' : '🔒';
});

// 面板拖动功能
const dragHandle = document.getElementById('drag-handle');
let isDragging = false;
let dragOffsetX = 0;
let dragOffsetY = 0;

dragHandle.addEventListener('mousedown', startDrag);
dragHandle.addEventListener('touchstart', startDrag, { passive: false });

function startDrag(e) {
    if (isPanelLocked) return;
    e.preventDefault();
    isDragging = true;
    const clientX = e.type === 'mousedown' ? e.clientX : e.touches[0].clientX;
    const clientY = e.type === 'mousedown' ? e.clientY : e.touches[0].clientY;
    const panelRect = controlPanel.getBoundingClientRect();
    dragOffsetX = clientX - panelRect.left;
    dragOffsetY = clientY - panelRect.top;
}

document.addEventListener('mousemove', onDrag);
document.addEventListener('touchmove', onDrag, { passive: false });

function onDrag(e) {
    if (!isDragging || isPanelLocked) return;
    e.preventDefault();
    const clientX = e.type === 'mousemove' ? e.clientX : e.touches[0].clientX;
    const clientY = e.type === 'mousemove' ? e.clientY : e.touches[0].clientY;
    const newLeft = clientX - dragOffsetX;
    const newTop = clientY - dragOffsetY;
    const maxLeft = window.innerWidth - controlPanel.offsetWidth;
    const maxTop = window.innerHeight - controlPanel.offsetHeight;
    controlPanel.style.left = Math.max(0, Math.min(newLeft, maxLeft)) + 'px';
    controlPanel.style.top = Math.max(0, Math.min(newTop, maxTop)) + 'px';
    controlPanel.style.right = 'auto';
}

document.addEventListener('mouseup', () => isDragging = false);
document.addEventListener('touchend', () => isDragging = false);

// 面板缩放功能
const resizeHandle = document.getElementById('resize-handle');
let isResizing = false;
let startWidth = 0;
let startHeight = 0;
let startX = 0;
let startY = 0;

resizeHandle.addEventListener('mousedown', startResize);
resizeHandle.addEventListener('touchstart', startResize, { passive: false });

function startResize(e) {
    if (isPanelLocked) return;
    e.preventDefault();
    isResizing = true;
    const clientX = e.type === 'mousedown' ? e.clientX : e.touches[0].clientX;
    const clientY = e.type === 'mousedown' ? e.clientY : e.touches[0].clientY;
    const panelRect = controlPanel.getBoundingClientRect();
    startWidth = panelRect.width;
    startHeight = panelRect.height;
    startX = clientX;
    startY = clientY;
}

document.addEventListener('mousemove', onResize);
document.addEventListener('touchmove', onResize, { passive: false });

function onResize(e) {
    if (!isResizing || isPanelLocked) return;
    e.preventDefault();
    const clientX = e.type === 'mousemove' ? e.clientX : e.touches[0].clientX;
    const clientY = e.type === 'mousemove' ? e.clientY : e.touches[0].clientY;
    const diffX = startX - clientX;
    const diffY = startY - clientY;
    const newWidth = Math.max(220, Math.min(startWidth + diffX, window.innerWidth - 30));
    const newHeight = Math.max(120, Math.min(startHeight + diffY, window.innerHeight - 30));
    controlPanel.style.width = newWidth + 'px';
    controlPanel.style.height = newHeight + 'px';
}

document.addEventListener('mouseup', () => isResizing = false);
document.addEventListener('touchend', () => isResizing = false);

        document.getElementById('color2').value = settings.color2;
        document.getElementById('bg-color').value = settings.bgColor;

        document.getElementById('speed-num').textContent = settings.speed;
        document.getElementById('trail-num').textContent = settings.trail;

        document.getElementById('line-num').textContent = settings.lineDistance;
        document.getElementById('line-width-num').textContent = settings.lineWidth;

        // 重置粒子
        initParticles();
    });
});

document.getElementById('random-btn').addEventListener('click', () => {
    const modes = ['follow', 'repel', 'gravity', 'random', 'swirl', 'firework', 'ripple', 'grid'];
    currentMode = modes[Math.floor(Math.random() * modes.length)];
    modeBtns.forEach(btn => {

    document.getElementById('line-width-slider').value = Math.random() * 2.9 + 0.1;
