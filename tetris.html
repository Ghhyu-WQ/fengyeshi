<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>俄罗斯方块</title>
<style>
  :root{
    --bg:#07080f; --bg2:#0d1024; --card:rgba(255,255,255,.05); --line:rgba(255,255,255,.12);
    --text:#eef1ff; --muted:#9aa3c7; --brand:#7cfcff; --brand2:#b07aff; --good:#67e8a3;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;color:var(--text);
    background:radial-gradient(1100px 600px at 15% -10%,rgba(124,252,255,.12),transparent 60%),
               radial-gradient(900px 500px at 110% 10%,rgba(176,122,255,.14),transparent 55%),
               linear-gradient(180deg,var(--bg),var(--bg2));
    min-height:100%;display:flex;flex-direction:column;align-items:center;padding:18px 14px 40px;
  }
  .top{width:min(480px,100%);display:flex;align-items:center;justify-content:space-between;gap:12px}
  h1{font-size:clamp(22px,5vw,30px);background:linear-gradient(90deg,var(--brand),var(--brand2));
     -webkit-background-clip:text;background-clip:text;color:transparent}
  .home{font-size:13px;color:var(--muted);border:1px solid var(--line);padding:8px 14px;border-radius:999px;
        background:var(--card);cursor:pointer;text-decoration:none}
  .home:hover{color:var(--text);border-color:var(--brand)}
  .wrap{width:min(480px,100%);display:flex;gap:14px;margin-top:16px;align-items:flex-start;justify-content:center}
  canvas{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:12px;touch-action:none;display:block}
  .side{display:flex;flex-direction:column;gap:12px;min-width:110px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 12px;text-align:center}
  .stat b{display:block;font-size:18px;font-family:ui-monospace,monospace}
  .stat span{font-size:11px;color:var(--muted)}
  .side .label{font-size:12px;color:var(--muted);text-align:center;margin-top:2px}
  .controls{width:min(480px,100%);display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:16px}
  .controls button{padding:12px 0;border-radius:10px;border:1px solid var(--line);background:var(--card);
        color:var(--text);font-weight:700;font-size:16px;cursor:pointer}
  .controls button:active{transform:scale(.95)}
  .tip{color:var(--muted);font-size:12px;margin-top:12px;text-align:center;width:min(480px,100%)}
  .overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
           background:rgba(5,6,15,.8);backdrop-filter:blur(4px);z-index:50}
  .overlay.show{display:flex}
  .overlay .box{background:var(--bg2);border:1px solid var(--line);border-radius:18px;padding:26px 30px;text-align:center;max-width:300px}
  .overlay h2{font-size:24px;margin-bottom:8px}
  .overlay p{color:var(--muted);font-size:14px;margin-bottom:16px}
  .overlay button{padding:10px 20px;border-radius:999px;border:none;cursor:pointer;font-weight:700;
        background:linear-gradient(90deg,var(--brand),var(--brand2));color:#06121a}
</style>
</head>
<body>
  <div class="top">
    <h1>🧱 俄罗斯方块</h1>
    <a class="home" href="index.html">返回首页</a>
  </div>

  <div class="wrap">
    <canvas id="cv" width="240" height="480"></canvas>
    <div class="side">
      <div class="stat"><b id="score">0</b><span>分数</span></div>
      <div class="stat"><b id="lines">0</b><span>消行</span></div>
      <div class="stat"><b id="level">1</b><span>等级</span></div>
      <div>
        <canvas id="next" width="96" height="96" style="margin:0 auto"></canvas>
        <div class="label">下一个</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button data-k="left">←</button>
    <button data-k="rotate">⟳</button>
    <button data-k="right">→</button>
    <button data-k="down">↓</button>
    <button data-k="drop">⤓</button>
  </div>

  <div class="tip">← → 移动，↑/⟳ 旋转，↓ 加速，空格 直接落下。消除整行得分，速度随等级提升。</div>

  <div class="overlay" id="over"><div class="box">
    <h2>游戏结束</h2><p id="overText"></p>
    <button id="again">再来一局</button>
  </div></div>

<script>
  const COLS=10, ROWS=20, CELL=24;
  const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
  const nextCv=document.getElementById('next'), nctx=nextCv.getContext('2d');
  const scoreEl=document.getElementById('score'), linesEl=document.getElementById('lines'), levelEl=document.getElementById('level');

  const COLORS=['#7cfcff','#b07aff','#67e8a3','#ffd36b','#ff8fcf','#8b9cff','#ff6b6b'];
  const SHAPES=[
    {m:[[1,1,1,1]], c:0},          // I
    {m:[[1,1],[1,1]], c:1},        // O
    {m:[[1,1,1],[0,1,0]], c:2},    // T
    {m:[[0,1,1],[1,1,0]], c:3},    // S
    {m:[[1,1,0],[0,1,1]], c:4},    // Z
    {m:[[1,0,0],[1,1,1]], c:5},    // J
    {m:[[0,0,1],[1,1,1]], c:6}     // L
  ];

  let board, cur, next, score, lines, level, dropMs, lastDrop, raf, running, over;

  function empty(){ return Array.from({length:ROWS},()=>Array(COLS).fill(-1)); }
  function rotate(m){ const r=m.length,c=m[0].length; const out=Array.from({length:c},()=>Array(r).fill(0));
    for(let i=0;i<r;i++)for(let j=0;j<c;j++) out[j][r-1-i]=m[i][j]; return out; }
  function spawn(){
    cur={...next, x:Math.floor((COLS-next.m[0].length)/2), y:0};
    next=randPiece();
    if(collide(cur.x,cur.y,cur.m)){ gameOver(); }
    drawNext();
  }
  function randPiece(){ const s=SHAPES[Math.floor(Math.random()*SHAPES.length)]; return {m:s.m.map(r=>r.slice()), c:s.c}; }
  function collide(x,y,m){ for(let i=0;i<m.length;i++)for(let j=0;j<m[i].length;j++){
    if(!m[i][j]) continue; const nx=x+j, ny=y+i;
    if(nx<0||nx>=COLS||ny>=ROWS) return true;
    if(ny>=0 && board[ny][nx]!==-1) return true;
  } return false; }
  function merge(){ const m=cur.m; for(let i=0;i<m.length;i++)for(let j=0;j<m[i].length;j++){
    if(m[i][j]){ const ny=cur.y+i, nx=cur.x+j; if(ny>=0) board[ny][nx]=cur.c; } } }
  function clearLines(){ let n=0; for(let i=ROWS-1;i>=0;i--){ if(board[i].every(v=>v!==-1)){ board.splice(i,1); board.unshift(Array(COLS).fill(-1)); n++; i++; } }
    if(n){ lines+=n; score+=n*100*(level); level=Math.floor(lines/10)+1; dropMs=Math.max(120,520-level*40); update(); } }
  function move(dx,dy){ if(collide(cur.x+dx,cur.y+dy,cur.m)) return false; cur.x+=dx; cur.y+=dy; return true; }
  function rotateCur(){
    const r=rotate(cur.m);
    if(!collide(cur.x,cur.y,r)) cur.m=r;
    else if(!collide(cur.x-1,cur.y,r)){ cur.x-=1; cur.m=r; }
    else if(!collide(cur.x+1,cur.y,r)){ cur.x+=1; cur.m=r; }
    else if(!collide(cur.x,cur.y-1,r)){ cur.y-=1; cur.m=r; }
  }
  function hardDrop(){ while(move(0,1)){} merge(); clearLines(); spawn(); }
  function update(){ scoreEl.textContent=score; linesEl.textContent=lines; levelEl.textContent=level; }
  function drawCell(g,x,y,c,s=CELL){ g.fillStyle=COLORS[c]; g.fillRect(x*s+1,y*s+1,s-2,s-2);
    g.fillStyle='rgba(255,255,255,.18)'; g.fillRect(x*s+1,y*s+1,s-2,4); }
  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    for(let i=0;i<ROWS;i++)for(let j=0;j<COLS;j++){ if(board[i][j]!==-1) drawCell(ctx,j,i,board[i][j]); }
    if(cur){ const m=cur.m; for(let i=0;i<m.length;i++)for(let j=0;j<m[i].length;j++){ if(m[i][j] && cur.y+i>=0) drawCell(ctx,cur.x+j,cur.y+i,cur.c); } }
  }
  function drawNext(){ nctx.clearRect(0,0,nextCv.width,nextCv.height);
    const m=next.m, s=20, ox=(nextCv.width-m[0].length*s)/2, oy=(nextCv.height-m.length*s)/2;
    for(let i=0;i<m.length;i++)for(let j=0;j<m[i].length;j++){ if(m[i][j]){ nctx.fillStyle=COLORS[next.c]; nctx.fillRect(ox+j*s+1,oy+i*s+1,s-2,s-2);} } }
  function loop(t){
    if(!running) return;
    if(t-lastDrop>dropMs){ if(!move(0,1)){ merge(); clearLines(); spawn(); } lastDrop=t; }
    draw(); raf=requestAnimationFrame(loop);
  }
  function start(){ cancelAnimationFrame(raf); board=empty(); score=0; lines=0; level=1; dropMs=520; over=false;
    next=randPiece(); spawn(); update(); running=true; lastDrop=performance.now(); raf=requestAnimationFrame(loop); }
  function gameOver(){ running=false; cancelAnimationFrame(raf); over=true;
    document.getElementById('overText').textContent='得分 '+score+' · 消除 '+lines+' 行';
    document.getElementById('over').classList.add('show'); }

  document.addEventListener('keydown',e=>{
    if(over) return; const k=e.key;
    if(['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(k)) e.preventDefault();
    if(k==='ArrowLeft') move(-1,0);
    else if(k==='ArrowRight') move(1,0);
    else if(k==='ArrowDown') move(0,1);
    else if(k==='ArrowUp'||k==='r'||k==='R') rotateCur();
    else if(k===' ') hardDrop();
    if(running) draw();
  });
  document.querySelectorAll('.controls button').forEach(b=>b.addEventListener('click',()=>{
    if(over) return; const k=b.dataset.k;
    if(k==='left') move(-1,0); else if(k==='right') move(1,0); else if(k==='down') move(0,1);
    else if(k==='rotate') rotateCur(); else if(k==='drop') hardDrop();
    if(running) draw();
  }));
  document.getElementById('again').addEventListener('click',()=>{ document.getElementById('over').classList.remove('show'); start(); });

  start();
</script>
</body>
</html>
