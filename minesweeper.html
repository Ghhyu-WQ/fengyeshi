<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>扫雷</title>
<style>
  :root{
    --bg:#07080f; --bg2:#0d1024; --card:rgba(255,255,255,.05); --line:rgba(255,255,255,.12);
    --text:#eef1ff; --muted:#9aa3c7; --brand:#7cfcff; --brand2:#b07aff; --good:#67e8a3;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;color:var(--text);
    background:radial-gradient(1100px 600px at 15% -10%,rgba(124,252,255,.12),transparent 60%),
               radial-gradient(900px 500px at 110% 10%,rgba(176,122,255,.14),transparent 55%),
               linear-gradient(180deg,var(--bg),var(--bg2));
    min-height:100%;display:flex;flex-direction:column;align-items:center;padding:18px 14px 40px;
  }
  .top{width:min(420px,100%);display:flex;align-items:center;justify-content:space-between;gap:12px}
  h1{font-size:clamp(22px,5vw,30px);background:linear-gradient(90deg,var(--brand),var(--brand2));
     -webkit-background-clip:text;background-clip:text;color:transparent}
  .home{font-size:13px;color:var(--muted);border:1px solid var(--line);padding:8px 14px;border-radius:999px;
        background:var(--card);cursor:pointer;text-decoration:none}
  .home:hover{color:var(--text);border-color:var(--brand)}
  .bar{width:min(420px,100%);display:flex;gap:10px;margin:14px 0}
  .stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 12px;text-align:center}
  .stat b{display:block;font-size:18px;font-family:ui-monospace,monospace}
  .stat span{font-size:11px;color:var(--muted)}
  .board{display:grid;grid-template-columns:repeat(9,34px);gap:3px;background:rgba(255,255,255,.04);
         border:1px solid var(--line);border-radius:14px;padding:10px;touch-action:none;user-select:none}
  .cell{width:34px;height:34px;border-radius:6px;border:none;background:rgba(255,255,255,.07);
        color:#fff;font-weight:800;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;
        font-family:ui-monospace,monospace;transition:.1s}
  .cell:hover{background:rgba(255,255,255,.12)}
  .cell.open{background:rgba(255,255,255,.03);cursor:default}
  .cell.flag{color:#ff8fcf}
  .cell.mine{background:rgba(255,107,107,.5)}
  .c1{color:#7cfcff}.c2{color:#67e8a3}.c3{color:#ffd36b}.c4{color:#ff8fcf}.c5{color:#8b9cff}.c6{color:#b07aff}.c7{color:#ff6b6b}.c8{color:#9aa3c7}
  .controls{width:min(420px,100%);display:flex;gap:10px;margin-top:14px;justify-content:center}
  .controls button{padding:10px 18px;border-radius:999px;border:1px solid var(--line);background:var(--card);
        color:var(--text);font-weight:700;font-size:14px;cursor:pointer}
  .controls button:hover{border-color:var(--brand)}
  .tip{color:var(--muted);font-size:12px;margin-top:12px;text-align:center;width:min(420px,100%)}
  .overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
           background:rgba(5,6,15,.8);backdrop-filter:blur(4px);z-index:50}
  .overlay.show{display:flex}
  .overlay .box{background:var(--bg2);border:1px solid var(--line);border-radius:18px;padding:26px 30px;text-align:center;max-width:300px}
  .overlay h2{font-size:24px;margin-bottom:8px}
  .overlay p{color:var(--muted);font-size:14px;margin-bottom:16px}
  .overlay button{padding:10px 20px;border-radius:999px;border:none;cursor:pointer;font-weight:700;
        background:linear-gradient(90deg,var(--brand),var(--brand2));color:#06121a}
</style>
</head>
<body>
  <div class="top">
    <h1>💣 扫雷</h1>
    <a class="home" href="index.html">返回首页</a>
  </div>

  <div class="bar">
    <div class="stat"><b id="mine">10</b><span>剩余雷</span></div>
    <div class="stat"><b id="time">0</b><span>用时</span></div>
  </div>

  <div class="board" id="board"></div>

  <div class="controls">
    <button id="restart">重新开始</button>
    <button id="mode">难度：初级</button>
  </div>

  <div class="tip">左键翻开，右键插旗。数字表示周围 8 格的雷数。翻开所有非雷格即获胜。</div>

  <div class="overlay" id="over"><div class="box">
    <h2 id="overTitle"></h2><p id="overText"></p>
    <button id="again">再来一局</button>
  </div></div>

<script>
  const MODES=[{n:'初级',size:9,mines:10},{n:'中级',size:16,mines:40},{n:'高级',size:22,mines:70}];
  let modeIdx=0, SIZE, MINES, grid, opened, flagged, timer, secs, over, started;
  const boardEl=document.getElementById('board'), mineEl=document.getElementById('mine'), timeEl=document.getElementById('time');

  function init(){
    SIZE=MODES[modeIdx].size; MINES=MODES[modeIdx].mines;
    boardEl.style.gridTemplateColumns=`repeat(${SIZE},34px)`;
    grid=Array.from({length:SIZE},()=>Array.from({length:SIZE},()=>({mine:false,open:false,flag:false,n:0})));
    opened=0; flagged=0; secs=0; over=false; started=false; clearInterval(timer); timeEl.textContent='0';
    mineEl.textContent=MINES;
    // place mines
    let placed=0;
    while(placed<MINES){ const i=Math.floor(Math.random()*SIZE), j=Math.floor(Math.random()*SIZE);
      if(!grid[i][j].mine){ grid[i][j].mine=true; placed++; } }
    for(let i=0;i<SIZE;i++)for(let j=0;j<SIZE;j++){ let c=0;
      for(let di=-1;di<=1;di++)for(let dj=-1;dj<=1;dj++){ const ni=i+di,nj=j+dj;
        if(ni>=0&&ni<SIZE&&nj>=0&&nj<SIZE&&grid[ni][nj].mine) c++; } grid[i][j].n=c; }
    render();
  }
  function render(){ boardEl.innerHTML='';
    for(let i=0;i<SIZE;i++)for(let j=0;j<SIZE;j++){ const cell=grid[i][j]; const b=document.createElement('button');
      b.className='cell'; b.dataset.i=i; b.dataset.j=j;
      if(cell.open){ b.classList.add('open'); if(cell.mine){ b.classList.add('mine'); b.textContent='💣'; }
        else if(cell.n>0){ b.textContent=cell.n; b.classList.add('c'+cell.n); } }
      else if(cell.flag){ b.classList.add('flag'); b.textContent='🚩'; }
      boardEl.appendChild(b); }
  }
  function reveal(i,j){
    if(i<0||i>=SIZE||j<0||j>=SIZE) return; const cell=grid[i][j];
    if(cell.open||cell.flag) return; cell.open=true; opened++;
    if(cell.mine){ lose(); return; }
    if(cell.n===0){ for(let di=-1;di<=1;di++)for(let dj=-1;dj<=1;dj++) reveal(i+di,j+dj); }
  }
  function click(i,j){
    if(over) return; const cell=grid[i][j]; if(cell.flag) return;
    if(!started){ started=true; timer=setInterval(()=>{ secs++; timeEl.textContent=secs; },1000); }
    if(cell.open) return;
    if(cell.mine){ cell.open=true; opened++; render(); lose(); return; }
    reveal(i,j); render();
    if(opened===SIZE*SIZE-MINES) win();
  }
  function flag(i,j){ if(over) return; const cell=grid[i][j]; if(cell.open) return;
    cell.flag=!cell.flag; flagged+=cell.flag?1:-1; mineEl.textContent=MINES-flagged; render(); }
  function lose(){ over=true; clearInterval(timer);
    for(let i=0;i<SIZE;i++)for(let j=0;j<SIZE;j++) if(grid[i][j].mine) grid[i][j].open=true;
    render(); showOver('💥 踩雷了','再接再厉！'); }
  function win(){ over=true; clearInterval(timer); showOver('🎉 通关！','用时 '+secs+' 秒'); }
  function showOver(t,p){ document.getElementById('overTitle').textContent=t; document.getElementById('overText').textContent=p;
    document.getElementById('over').classList.add('show'); }

  boardEl.addEventListener('click',e=>{ const b=e.target.closest('.cell'); if(!b) return; click(+b.dataset.i,+b.dataset.j); });
  boardEl.addEventListener('contextmenu',e=>{ e.preventDefault(); const b=e.target.closest('.cell'); if(!b) return; flag(+b.dataset.i,+b.dataset.j); });

  document.getElementById('restart').addEventListener('click',()=>{ document.getElementById('over').classList.remove('show'); init(); });
  document.getElementById('again').addEventListener('click',()=>{ document.getElementById('over').classList.remove('show'); init(); });
  document.getElementById('mode').addEventListener('click',()=>{ modeIdx=(modeIdx+1)%MODES.length;
    document.getElementById('mode').textContent='难度：'+MODES[modeIdx].n; document.getElementById('over').classList.remove('show'); init(); });

  init();
</script>
</body>
</html>
