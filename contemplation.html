<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>三百秒沉思 · 思维刻度</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    overflow: hidden;
    font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background-color: #0a0a14;
  }
  canvas { display:block; position:fixed; top:0; left:0; z-index:1; }
  #info {
    position:absolute; top:30px; left:0; width:100%; text-align:center;
    color:rgba(220,240,255,0.9); text-shadow:0 0 20px #4a80ff, 0 0 40px #b07aff;
    z-index:10; pointer-events:none; user-select:none;
    animation:softGlow 3s infinite alternate; letter-spacing:4px; font-weight:200; font-size:1.2rem;
  }
  #counter-panel {
    position:absolute; bottom:15%; left:50%; transform:translateX(-50%); z-index:20;
    background:rgba(10,10,30,0.5); backdrop-filter:blur(8px);
    padding:20px 50px; border-radius:60px; border:1px solid rgba(100,180,255,0.3);
    box-shadow:0 0 50px rgba(70,130,255,0.3); text-align:center; pointer-events:none;
    color:white; font-weight:300; letter-spacing:2px;
  }
  #depth-display {
    font-size:4rem; font-weight:400;
    background:linear-gradient(45deg,#a0d0ff,#ffb8d9);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    text-shadow:0 0 30px #6a8cff; line-height:1.2;
  }
  #depth-label { font-size:1rem; opacity:0.7; letter-spacing:6px; margin-top:5px; color:#ccd9ff; }
  #command-hint {
    position:absolute; bottom:5%; right:5%; color:rgba(180,200,255,0.5); font-size:0.8rem; z-index:15;
    background:rgba(0,0,0,0.3); padding:8px 18px; border-radius:40px; backdrop-filter:blur(3px);
    border:1px solid rgba(255,255,255,0.15); pointer-events:none; letter-spacing:1px;
  }
  #command-hint span { color:#aaf0ff; font-weight:400; }
  @keyframes softGlow {
    0% { opacity:0.6; filter:drop-shadow(0 0 5px #5588ff); }
    100% { opacity:1; filter:drop-shadow(0 0 25px #aa88ff); }
  }
  .click-effect {
    position:absolute; width:20px; height:20px; border-radius:50%;
    background:radial-gradient(circle,#fff,#a0c0ff); pointer-events:none; z-index:100;
    transform:translate(-50%,-50%); animation:clickRipple 1s ease-out forwards;
  }
  @keyframes clickRipple {
    0% { width:0; height:0; opacity:1; }
    100% { width:150px; height:150px; opacity:0; }
  }
  .home {
    position:fixed; top:18px; left:18px; z-index:30; color:#ffd055; font-size:14px; font-weight:700;
    padding:8px 14px; background:rgba(0,0,0,0.55); border:1px solid #ffd055; border-radius:8px;
    text-decoration:none; transition:.25s;
  }
  .home:hover { box-shadow:0 0 15px #ffd055; color:#fff; }
</style>
</head>
<body>
  <a class="home" href="index.html">返回首页</a>
  <div id="info">⚡ 内 在 命 令 · 沉 思 三 百 秒 ⚡</div>
  <div id="counter-panel">
    <div id="depth-display">0/300</div>
    <div id="depth-label">思 考 深 度</div>
  </div>
  <div id="command-hint">💬 <span>点击 或 按空格键</span> · 积累思考</div>
  <canvas id="cv"></canvas>

<script>
(function () {
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  let W, H, DPR;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    cv.width = W * DPR; cv.height = H * DPR;
    cv.style.width = W + 'px'; cv.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  const TOTAL = 300;
  const cx = () => W / 2, cy = () => H / 2;

  // 背景星群
  const stars = [];
  for (let i = 0; i < 220; i++) {
    stars.push({
      x: Math.random(), y: Math.random(),
      r: Math.random() * 1.6 + 0.3,
      tw: Math.random() * Math.PI * 2,
      sp: Math.random() * 0.0006 + 0.0002
    });
  }

  // 环形粒子（300 个），初始暗蓝紫，点亮变暖金
  const ring = [];
  for (let i = 0; i < TOTAL; i++) {
    const a = (i / TOTAL) * Math.PI * 2;
    ring.push({ a });
  }
  function litColor(i) {
    const t = i / TOTAL;
    const hue = 36 + t * 18; // 金 -> 橙红
    return `hsl(${hue},100%,${55 + t * 10}%)`;
  }

  // 中心小光点
  const sparkles = [];
  for (let i = 0; i < 60; i++) {
    const th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1);
    const r = 1.2 + Math.random() * 0.5;
    sparkles.push({ th, ph, r });
  }

  // 完成爆发粒子
  let burst = null;
  function triggerCompletion() {
    const arr = [];
    for (let i = 0; i < 400; i++) {
      const th = Math.random() * Math.PI * 2, ph = Math.acos(2 * Math.random() - 1);
      const sp = 0.5 + Math.random() * 5;
      arr.push({
        x: 0, y: 0, z: 0,
        vx: sp * Math.sin(ph) * Math.cos(th),
        vy: sp * Math.sin(ph) * Math.sin(th),
        vz: sp * Math.cos(ph),
        life: 1
      });
    }
    burst = { p: arr, t: 0 };
    setTimeout(() => { burst = null; }, 900);
  }

  let depth = 0;
  let time = 0;
  let mouseX = 0, mouseY = 0;
  function setParallax(e) {
    const t = e.touches ? e.touches[0] : e;
    mouseX = (t.clientX / W) * 2 - 1;
    mouseY = -((t.clientY / H) * 2 - 1);
  }
  window.addEventListener('mousemove', setParallax);

  function addRipple(x, y) {
    const r = document.createElement('div');
    r.className = 'click-effect'; r.style.left = x + 'px'; r.style.top = y + 'px';
    document.body.appendChild(r); setTimeout(() => r.remove(), 1000);
  }

  function bump(x, y) {
    if (depth >= TOTAL) return;
    depth = Math.min(depth + 1, TOTAL);
    document.getElementById('depth-display').textContent = depth + '/' + TOTAL;
    if (depth === TOTAL) triggerCompletion();
    if (x != null) addRipple(x, y);
  }
  window.addEventListener('click', e => bump(e.clientX, e.clientY));
  window.addEventListener('keydown', e => {
    if (e.code === 'Space') { e.preventDefault(); bump(W / 2, H / 2); }
  });
  window.addEventListener('touchstart', e => {
    e.preventDefault(); const t = e.touches[0]; bump(t.clientX, t.clientY);
  }, { passive: false });

  function draw() {
    time += 1;
    ctx.clearRect(0, 0, W, H);
    // 背景
    ctx.fillStyle = '#0a0a18'; ctx.fillRect(0, 0, W, H);

    const px = mouseX * 26, py = mouseY * 16; // 视差
    const ox = cx() + px, oy = cy() + py;

    // 星群
    for (const s of stars) {
      const a = 0.4 + 0.6 * Math.abs(Math.sin(time * s.sp + s.tw));
      ctx.globalAlpha = a; ctx.fillStyle = '#aaccff';
      ctx.beginPath(); ctx.arc(s.x * W, s.y * H, s.r, 0, 7); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // 环形粒子
    const R = Math.min(W, H) * 0.30;
    const rot = time * 0.0015;
    for (let i = 0; i < TOTAL; i++) {
      const a = ring[i].a + rot;
      const x = ox + Math.cos(a) * R;
      const y = oy + Math.sin(a) * R * 0.42;
      const lit = i < depth;
      if (lit) {
        ctx.fillStyle = litColor(i);
        ctx.shadowColor = litColor(i); ctx.shadowBlur = 10;
      } else {
        ctx.fillStyle = 'rgba(120,140,220,0.45)';
        ctx.shadowBlur = 0;
      }
      const sz = lit ? 3.2 : 2.4;
      ctx.beginPath(); ctx.arc(x, y, sz, 0, 7); ctx.fill();
    }
    ctx.shadowBlur = 0;

    // 中心呼吸球
    const prog = depth / TOTAL;
    const breathe = 1 + Math.sin(time * 0.05) * 0.04;
    const cr = Math.min(W, H) * 0.06 * breathe;
    const g = ctx.createRadialGradient(ox, oy, 1, ox, oy, cr * 2);
    g.addColorStop(0, `hsla(${200 - prog * 120},80%,65%,0.95)`);
    g.addColorStop(0.5, `hsla(${210 - prog * 120},80%,55%,0.5)`);
    g.addColorStop(1, 'rgba(10,10,30,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(ox, oy, cr * 2, 0, 7); ctx.fill();

    // 中心小光点
    for (const s of sparkles) {
      const a = s.th + time * 0.01;
      const x = ox + Math.cos(a) * s.r * cr;
      const y = oy + Math.sin(a) * s.r * cr;
      ctx.fillStyle = 'rgba(255,221,153,0.9)';
      ctx.beginPath(); ctx.arc(x, y, 1.6, 0, 7); ctx.fill();
    }

    // 爆发
    if (burst) {
      burst.t++;
      ctx.fillStyle = 'rgba(255,170,136,0.9)';
      for (const p of burst.p) {
        p.x += p.vx; p.y += p.vy; p.z += p.vz; p.life -= 0.02;
        if (p.life <= 0) continue;
        ctx.globalAlpha = Math.max(0, p.life);
        ctx.beginPath(); ctx.arc(ox + p.x * 12, oy + p.y * 12, 1.8, 0, 7); ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    requestAnimationFrame(draw);
  }
  draw();
  document.getElementById('depth-display').textContent = '0/' + TOTAL;
})();
</script>
</body>
</html>
