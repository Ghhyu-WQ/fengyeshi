<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>贪吃蛇</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'PingFang SC','Microsoft YaHei',sans-serif;
    background:linear-gradient(160deg,#07080f,#0d1024); color:#eef1ff;
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:18px;
  }
  .home {
    align-self:flex-start; color:#ffd055; font-size:14px; font-weight:700;
    padding:8px 14px; background:rgba(0,0,0,0.5); border:1px solid #ffd055; border-radius:8px;
    text-decoration:none;
  }
  h1 { font-size:22px; margin:8px 0 4px; letter-spacing:1px; }
  .bar { display:flex; gap:18px; margin:8px 0 10px; color:#9aa3c7; font-size:14px; }
  .bar b { color:#7cfcff; }
  .wrap { position:relative; }
  canvas {
    background:#0a0d1e; border:1px solid rgba(124,252,255,0.25); border-radius:12px;
    touch-action:none; max-width:92vw; height:auto;
  }
  .overlay {
    position:absolute; inset:0; display:flex; flex-direction:column; gap:14px;
    align-items:center; justify-content:center; background:rgba(5,7,15,0.82);
    border-radius:12px; text-align:center; padding:20px;
  }
  .overlay.hidden { display:none; }
  .overlay p { color:#9aa3c7; max-width:280px; line-height:1.6; }
  .btn {
    padding:11px 22px; border-radius:999px; border:none; cursor:pointer;
    font-weight:700; font-size:15px; color:#06121a;
    background:linear-gradient(90deg,#7cfcff,#b07aff);
  }
  .hint { color:#9aa3c7; font-size:12.5px; margin-top:12px; }
</style>
</head>
<body>
  <a class="home" href="index.html">返回首页</a>
  <h1>🐍 贪吃蛇</h1>
  <div class="bar"><span>得分 <b id="score">0</b></span><span>最高 <b id="best">0</b></span></div>
  <div class="wrap">
    <canvas id="cv" width="400" height="400"></canvas>
    <div class="overlay" id="ov">
      <h2 id="ovTitle">准备好了吗？</h2>
      <p id="ovText">方向键 / WASD 控制移动；手机可直接滑动屏幕。吃到果实变长，撞墙或咬到自己就结束。</p>
      <button class="btn" id="startBtn">开始游戏</button>
    </div>
  </div>
  <div class="hint">提示：空格暂停 · 支持触摸滑动</div>

<script>
(function () {
  const cv = document.getElementById('cv'), ctx = cv.getContext('2d');
  const N = 20, SIZE = cv.width / N;
  const scoreEl = document.getElementById('score'), bestEl = document.getElementById('best');
  const ov = document.getElementById('ov'), ovTitle = document.getElementById('ovTitle'), ovText = document.getElementById('ovText');
  const startBtn = document.getElementById('startBtn');

  let best = 0; try { best = +localStorage.getItem('snake_best') || 0; } catch (e) {}
  bestEl.textContent = best;

  let snake, dir, nextDir, food, score, loop, paused, alive;

  function reset() {
    snake = [{x:9,y:10},{x:8,y:10},{x:7,y:10}];
    dir = {x:1,y:0}; nextDir = {x:1,y:0};
    score = 0; scoreEl.textContent = 0;
    paused = false; alive = true;
    placeFood();
  }
  function placeFood() {
    do { food = {x:Math.floor(Math.random()*N), y:Math.floor(Math.random()*N)}; }
    while (snake.some(s => s.x===food.x && s.y===food.y));
  }
  function step() {
    dir = nextDir;
    const head = {x:snake[0].x+dir.x, y:snake[0].y+dir.y};
    if (head.x<0||head.x>=N||head.y<0||head.y>=N || snake.some(s=>s.x===head.x&&s.y===head.y)) {
      return gameOver();
    }
    snake.unshift(head);
    if (head.x===food.x && head.y===food.y) {
      score++; scoreEl.textContent = score; placeFood();
    } else snake.pop();
    draw();
  }
  function draw() {
    ctx.fillStyle = '#0a0d1e'; ctx.fillRect(0,0,cv.width,cv.height);
    // 网格
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    for (let i=0;i<=N;i++){ ctx.beginPath();ctx.moveTo(i*SIZE,0);ctx.lineTo(i*SIZE,cv.height);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,i*SIZE);ctx.lineTo(cv.width,i*SIZE);ctx.stroke(); }
    // 食物
    ctx.fillStyle = '#ff6b9d'; ctx.shadowColor='#ff6b9d'; ctx.shadowBlur=12;
    ctx.beginPath(); ctx.arc(food.x*SIZE+SIZE/2, food.y*SIZE+SIZE/2, SIZE/2-2, 0, 7); ctx.fill();
    ctx.shadowBlur = 0;
    // 蛇
    snake.forEach((s,i)=>{
      const t = i/snake.length;
      ctx.fillStyle = `hsl(${190 - t*60},90%,${60 - t*15}%)`;
      ctx.fillRect(s.x*SIZE+1, s.y*SIZE+1, SIZE-2, SIZE-2);
    });
    ctx.fillStyle = '#fff';
    ctx.fillRect(snake[0].x*SIZE+3, snake[0].y*SIZE+3, SIZE-6, SIZE-6);
  }
  function gameOver() {
    alive = false; clearInterval(loop);
    if (score > best) { best = score; bestEl.textContent = best; try{localStorage.setItem('snake_best',best);}catch(e){} }
    ovTitle.textContent = '游戏结束';
    ovText.textContent = '本局得分 ' + score + '。再来一局？';
    ov.classList.remove('hidden');
  }
  function loopSpeed() { return Math.max(70, 150 - score * 4); }
  function start() {
    reset(); draw(); ov.classList.add('hidden');
    clearInterval(loop); loop = setInterval(()=>{ if(alive && !paused) step(); }, loopSpeed());
    // 速度随分数提升
    clearInterval(window.__sp); window.__sp = setInterval(()=>{ if(alive && !paused){ clearInterval(loop); loop=setInterval(()=>{if(alive&&!paused)step();},loopSpeed()); } }, 1000);
  }

  // 控制
  function setDir(x,y){ if(x===-dir.x && y===-dir.y) return; nextDir={x,y}; }
  window.addEventListener('keydown', e=>{
    const k=e.key.toLowerCase();
    if(k==='arrowup'||k==='w') setDir(0,-1);
    else if(k==='arrowdown'||k==='s') setDir(0,1);
    else if(k==='arrowleft'||k==='a') setDir(-1,0);
    else if(k==='arrowright'||k==='d') setDir(1,0);
    else if(k===' '){ e.preventDefault(); paused=!paused; }
  });
  let tsx=0,tsy=0;
  cv.addEventListener('touchstart',e=>{tsx=e.touches[0].clientX;tsy=e.touches[0].clientY;},{passive:true});
  cv.addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-tsx, dy=e.changedTouches[0].clientY-tsy;
    if(Math.abs(dx)>Math.abs(dy)) setDir(dx>0?1:-1,0); else setDir(0,dy>0?1:-1);
  },{passive:true});

  startBtn.addEventListener('click', start);
  reset(); draw();
})();
</script>
</body>
</html>
