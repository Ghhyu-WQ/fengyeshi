<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>打砖块</title>
<style>
  :root{
    --bg:#07080f; --bg2:#0d1024; --card:rgba(255,255,255,.05); --line:rgba(255,255,255,.12);
    --text:#eef1ff; --muted:#9aa3c7; --brand:#7cfcff; --brand2:#b07aff; --good:#67e8a3;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;color:var(--text);
    background:radial-gradient(1100px 600px at 15% -10%,rgba(124,252,255,.12),transparent 60%),
               radial-gradient(900px 500px at 110% 10%,rgba(176,122,255,.14),transparent 55%),
               linear-gradient(180deg,var(--bg),var(--bg2));
    min-height:100%;display:flex;flex-direction:column;align-items:center;padding:18px 14px 40px;
  }
  .top{width:min(480px,100%);display:flex;align-items:center;justify-content:space-between;gap:12px}
  h1{font-size:clamp(22px,5vw,30px);background:linear-gradient(90deg,var(--brand),var(--brand2));
     -webkit-background-clip:text;background-clip:text;color:transparent}
  .home{font-size:13px;color:var(--muted);border:1px solid var(--line);padding:8px 14px;border-radius:999px;
        background:var(--card);cursor:pointer;text-decoration:none}
  .home:hover{color:var(--text);border-color:var(--brand)}
  .bar{width:min(480px,100%);display:flex;gap:10px;margin:14px 0}
  .stat{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:8px 12px;text-align:center}
  .stat b{display:block;font-size:18px;font-family:ui-monospace,monospace}
  .stat span{font-size:11px;color:var(--muted)}
  canvas{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:12px;touch-action:none;display:block;width:min(480px,100%)}
  .controls{width:min(480px,100%);display:flex;gap:10px;margin-top:14px;justify-content:center}
  .controls button{padding:10px 18px;border-radius:999px;border:1px solid var(--line);background:var(--card);
        color:var(--text);font-weight:700;font-size:14px;cursor:pointer}
  .controls button:hover{border-color:var(--brand)}
  .tip{color:var(--muted);font-size:12px;margin-top:12px;text-align:center;width:min(480px,100%)}
  .overlay{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
           background:rgba(5,6,15,.8);backdrop-filter:blur(4px);z-index:50}
  .overlay.show{display:flex}
  .overlay .box{background:var(--bg2);border:1px solid var(--line);border-radius:18px;padding:26px 30px;text-align:center;max-width:300px}
  .overlay h2{font-size:24px;margin-bottom:8px}
  .overlay p{color:var(--muted);font-size:14px;margin-bottom:16px}
  .overlay button{padding:10px 20px;border-radius:999px;border:none;cursor:pointer;font-weight:700;
        background:linear-gradient(90deg,var(--brand),var(--brand2));color:#06121a}
</style>
</head>
<body>
  <div class="top">
    <h1>🎾 打砖块</h1>
    <a class="home" href="index.html">返回首页</a>
  </div>

  <div class="bar">
    <div class="stat"><b id="score">0</b><span>分数</span></div>
    <div class="stat"><b id="lives">3</b><span>生命</span></div>
    <div class="stat"><b id="level">1</b><span>关卡</span></div>
  </div>

  <canvas id="cv" width="480" height="360"></canvas>

  <div class="controls">
    <button id="start">开始 / 暂停</button>
    <button id="restart">重新开始</button>
  </div>

  <div class="tip">移动鼠标或手指控制挡板，接住小球击碎所有砖块。球掉落扣 1 生命。</div>

  <div class="overlay" id="over"><div class="box">
    <h2 id="overTitle"></h2><p id="overText"></p>
    <button id="again">再来一局</button>
  </div></div>

<script>
  const cv=document.getElementById('cv'), ctx=cv.getContext('2d');
  const W=cv.width, H=cv.height;
  const scoreEl=document.getElementById('score'), livesEl=document.getElementById('lives'), levelEl=document.getElementById('level');
  const BRICK_COLORS=['#7cfcff','#b07aff','#67e8a3','#ffd36b','#ff8fcf'];

  let paddle, ball, bricks, score, lives, level, running, raf, paused, over;
  const PW=90, PH=12, BW=44, BH=18, PROWS=5, PCOLS=9;

  function reset(full){
    paddle={x:W/2-PW/2,y:H-PH-14,w:PW,h:PH};
    ball={x:W/2,y:H-30,r:7,dx:3.2,dy:-3.6,speed:5};
    if(full){ score=0; lives=3; level=1; }
    buildBricks();
    update();
  }
  function buildBricks(){
    bricks=[];
    const pad=6, totalW=PCOLS*BW+(PCOLS-1)*pad, offX=(W-totalW)/2, offY=40;
    for(let r=0;r<PROWS;r++)for(let c=0;c<PCOLS;c++){
      bricks.push({x:offX+c*(BW+pad),y:offY+r*(BH+pad),w:BW,h:BH,
        color:BRICK_COLORS[(r+level-1)%BRICK_COLORS.length],alive:true,hp:1+(level>3?1:0)});
    }
  }
  function update(){ scoreEl.textContent=score; livesEl.textContent=lives; levelEl.textContent=level; }
  function loop(){
    if(!running||paused){ return; }
    // paddle clamp
    paddle.x=Math.max(0,Math.min(W-paddle.w,paddle.x));
    ball.x+=ball.dx; ball.y+=ball.dy;
    if(ball.x-ball.r<0){ ball.x=ball.r; ball.dx*=-1; }
    if(ball.x+ball.r>W){ ball.x=W-ball.r; ball.dx*=-1; }
    if(ball.y-ball.r<0){ // 顶部反弹：强制带水平分量，杜绝「顶部↔挡板」纯竖直死循环
      ball.y=ball.r;
      const sign=ball.dx>=0?1:-1;
      let ax=Math.abs(ball.dx);
      if(ax<ball.speed*0.30) ax=ball.speed*0.42;
      ball.dx=sign*ax;
      ball.dy=Math.sqrt(Math.max(0,ball.speed*ball.speed-ax*ax));
    }
    // paddle
    if(ball.y+ball.r>=paddle.y && ball.y+ball.r<=paddle.y+paddle.h+6 && ball.x>=paddle.x && ball.x<=paddle.x+paddle.w && ball.dy>0){
      ball.y=paddle.y-ball.r;
      let hit=(ball.x-(paddle.x+paddle.w/2))/(paddle.w/2);
      if(hit>1) hit=1; else if(hit<-1) hit=-1;
      if(Math.abs(hit)<0.30) hit=(hit>=0?1:-1)*0.35; // 中心命中也强制偏移，防止竖直来回弹
      ball.dx=hit*ball.speed*0.9;
      ball.dy=-Math.sqrt(Math.max(0,ball.speed*ball.speed-ball.dx*ball.dx));
    }
    // bricks — 判定撞击方向（上下面 or 左右面），只翻转对应轴并把球推出砖块外，
    // 避免球卡在砖块里反复横跳（原 bug：只翻转 dy 且不推出，导致在顶部反复上下弹）
    for(const b of bricks){ if(!b.alive) continue;
      if(ball.x+ball.r>b.x && ball.x-ball.r<b.x+b.w && ball.y+ball.r>b.y && ball.y-ball.r<b.y+b.h){
        const overlapL=(ball.x+ball.r)-b.x;        // 球从左撞入的重叠
        const overlapR=(b.x+b.w)-(ball.x-ball.r);   // 球从右撞入的重叠
        const overlapT=(ball.y+ball.r)-b.y;         // 球从上撞入的重叠
        const overlapB=(b.y+b.h)-(ball.y-ball.r);   // 球从下撞入的重叠
        const minX=Math.min(overlapL,overlapR), minY=Math.min(overlapT,overlapB);
        if(minX<minY){ // 侧面碰撞：翻转水平速度并沿 x 推出
          ball.dx*=-1; ball.x += (overlapL<overlapR?-minX:minX);
        } else {       // 上/下碰撞：翻转垂直速度并沿 y 推出
          ball.dy*=-1; ball.y += (overlapT<overlapB?-minY:minY);
        }
        b.hp--; if(b.hp<=0){ b.alive=false; score+=10*level; } update();
        break;
      }
    }
    if(ball.y-ball.r>H){ lives--; update(); if(lives<=0){ gameOver(false); return; } reset(false); }
    if(bricks.every(b=>!b.alive)){ level++; ball.speed+=0.6; reset(false); }
    draw();
    raf=requestAnimationFrame(loop);
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    for(const b of bricks){ if(!b.alive) continue; ctx.fillStyle=b.color; ctx.fillRect(b.x,b.y,b.w,b.h);
      ctx.fillStyle='rgba(255,255,255,.18)'; ctx.fillRect(b.x,b.y,b.w,3); }
    ctx.fillStyle='#eef1ff'; ctx.fillRect(paddle.x,paddle.y,paddle.w,paddle.h);
    ctx.beginPath(); ctx.fillStyle='#7cfcff'; ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2); ctx.fill();
  }
  function start(){ if(over) return; if(!running){ running=true; paused=false; raf=requestAnimationFrame(loop); } else { paused=!paused; if(!paused) raf=requestAnimationFrame(loop); } }
  function gameOver(win){ running=false; over=true; cancelAnimationFrame(raf);
    document.getElementById('overTitle').textContent=win?'🎉 全部通关':'游戏结束';
    document.getElementById('overText').textContent='得分 '+score;
    document.getElementById('over').classList.add('show'); }

  // input
  function movePaddle(clientX){ const rect=cv.getBoundingClientRect(); const x=(clientX-rect.left)*(W/rect.width);
    paddle.x=x-paddle.w/2; }
  cv.addEventListener('mousemove',e=>{ if(running&&!paused) movePaddle(e.clientX); });
  cv.addEventListener('touchmove',e=>{ if(running&&!paused){ movePaddle(e.touches[0].clientX); e.preventDefault(); } },{passive:false});

  document.getElementById('start').addEventListener('click',start);
  document.getElementById('restart').addEventListener('click',()=>{ document.getElementById('over').classList.remove('show'); over=false; running=false; reset(true); draw(); });
  document.getElementById('again').addEventListener('click',()=>{ document.getElementById('over').classList.remove('show'); over=false; running=false; reset(true); draw(); });

  reset(true); draw();
</script>
</body>
</html>
