<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>网站维护中</title>
    <style>
        body {
            text-align: center;
            margin-top: 100px;
            font-size: 20px;
        }
        button {
            padding: 12px 24px;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <p>本网站正在维护中，如果你想访问旧网站，请点击下面的按钮。</p>
    <br>
    <button onclick="goToOldSite()">确定</button>

    <script>
        function goToOldSite() {
            // 跳转到旧网站页面（你可以改成你真实的地址）
            window.location.href = "1.html";
        }
    </script>
</body>
</html>
