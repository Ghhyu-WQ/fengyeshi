<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> inward · 大圆满 · 无bug版 </title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #1e1a2e, #2a2440);
            color: #ede7f6;
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: background 0.3s;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            font-weight: 300;
            font-size: 3.5rem;
            letter-spacing: 0.2rem;
            background: linear-gradient(135deg, #d9c9ff, #b8a9e6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 20px #7f6bb0;
        }
        .header p {
            font-size: 1.1rem;
            opacity: 0.7;
            font-style: italic;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.2rem;
            max-width: 1600px;
            width: 100%;
        }
        .card {
            background: rgba(30, 25, 45, 0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(220, 200, 255, 0.2);
            border-radius: 1.8rem;
            padding: 1rem;
            box-shadow: 0 20px 40px -15px rgba(0,0,0,0.5);
            transition: transform 0.2s, border-color 0.3s;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            border-color: rgba(200, 170, 255, 0.5);
            transform: translateY(-3px);
        }
        .card-title {
            font-size: 1rem;
            font-weight: 300;
            letter-spacing: 0.1rem;
            margin-bottom: 0.5rem;
            color: #cbbff0;
            border-bottom: 1px dashed #6a5c8c;
            padding-bottom: 0.3rem;
        }
        .card-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 120px;
        }
        button {
            background: rgba(255,255,255,0.1);
            border: 1px solid #8f7eb5;
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.75rem;
            margin: 0.2rem;
        }
        button:hover {
            background: #6d5a95;
        }
        .slider {
            width: 100%;
            margin: 0.3rem 0;
            accent-color: #b09eff;
        }
        canvas {
            background: rgba(10, 8, 20, 0.6);
            border-radius: 20px;
            width: 100%;
            height: auto;
            aspect-ratio: 16/9;
            display: block;
        }
        .mini-canvas {
            width: 100%;
            aspect-ratio: 1/1;
            border-radius: 20px;
            background: #1e1935;
        }
        .flex-row {
            display: flex;
            gap: 0.4rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 0.3rem;
        }
        .color-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.2);
            transition: 0.2s;
            box-shadow: 0 5px 10px rgba(0,0,0,0.3);
        }
        .color-dot:hover { transform: scale(1.15); border-color: white; }
        .quote-box {
            font-size: 0.85rem;
            font-style: italic;
            color: #ded1ff;
            text-align: center;
        }
        .counter-num {
            font-size: 2.8rem;
            font-weight: 300;
            color: #d9c5ff;
            text-shadow: 0 0 20px #a07df0;
        }
        .stone {
            width: 20px; height: 16px; background: #8b7aa0; border-radius: 60% 40% 50% 50%; box-shadow: 0 2px 4px black; display: inline-block; margin: 2px;
        }
        .bead {
            width: 18px; height: 18px; background: #b39ec9; border-radius: 50%; box-shadow: 0 2px 5px black; cursor: pointer; display: inline-block; margin: 2px;
        }
        .fortune-box {
            background: #2f254a; padding: 0.3rem 1rem; border-radius: 60px; font-size: 0.9rem;
        }
        .indicator {
            font-size: 0.7rem; color: #c7b3ff; margin-top: 0.2rem;
        }
    </style>
</head>
<body id="mainBody">
    <div class="header">
        <h1>✨  inward · 大圆满 ✨</h1>
        <p>—— 万法归一，一归何处 ——</p>
    </div>

    <div class="grid" id="appGrid"></div>

    <script>
        (function() {
            const body = document.getElementById('mainBody');
            const grid = document.getElementById('appGrid');

            // 工具函数：生成随机hex
            function randomColor() {
                return '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');
            }

            // 全局状态
            let currentBrushColor = '#cdb9ff'; // 涂鸦画笔颜色

            // 卡片数据 (每个卡片包含标题和渲染函数)
            const cards = [];

            // 1 呼吸球
            cards.push({
                title: '🌬️ 呼吸 · 心',
                render: (container) => {
                    const ball = document.createElement('div');
                    ball.style.width = '70px';
                    ball.style.height = '70px';
                    ball.style.borderRadius = '50%';
                    ball.style.background = 'radial-gradient(circle at 30% 30%, #b09eff, #5f4b8b)';
                    ball.style.boxShadow = '0 0 40px #9d86d0';
                    ball.style.transition = 'transform 0.1s ease';
                    ball.style.cursor = 'pointer';
                    container.appendChild(ball);

                    let scale = 1, dir = 1;
                    let interval = setInterval(() => {
                        scale += 0.008 * dir;
                        if (scale >= 1.25) dir = -1;
                        if (scale <= 0.9) dir = 1;
                        ball.style.transform = `scale(${scale})`;
                    }, 60);

                    ball.addEventListener('click', () => { scale = 1; dir = 1; });

                    const slider = document.createElement('input');
                    slider.type = 'range';
                    slider.className = 'slider';
                    slider.min = 30; slider.max = 150; slider.value = 70;
                    slider.addEventListener('input', (e) => {
                        clearInterval(interval);
                        interval = setInterval(() => {
                            scale += 0.008 * dir;
                            if (scale >= 1.25) dir = -1;
                            if (scale <= 0.9) dir = 1;
                            ball.style.transform = `scale(${scale})`;
                        }, 200 - e.target.value);
                    });
                    container.appendChild(slider);
                }
            });

            // 2 情绪色板 (改变全局背景和画笔)
            cards.push({
                title: '🎨 情绪 · 色',
                render: (container) => {
                    const palette = document.createElement('div');
                    palette.className = 'flex-row';
                    const colors = ['#5d4a7a', '#2c6e63', '#9e5f7b', '#b37b48', '#3e5879'];
                    colors.forEach(c => {
                        const dot = document.createElement('div');
                        dot.className = 'color-dot';
                        dot.style.background = c;
                        dot.dataset.color = c;
                        dot.addEventListener('click', () => {
                            body.style.background = `linear-gradient(145deg, ${c}88, #1a1530)`;
                            currentBrushColor = c; // 更新全局画笔颜色
                        });
                        palette.appendChild(dot);
                    });
                    container.appendChild(palette);
                }
            });

            // 3 内心语录
            cards.push({
                title: '📜 内心 · 语',
                render: (container) => {
                    const quotes = [
                        "你内心的空间比天空更广阔。","安静下来，才能听见心的声音。",
                        "不要向外寻找答案，向内看。","每一次呼吸都是新生。",
                        "你本身就足够完整。","花未开时也是花。","跟随直觉，它知道路。",
                        "心若不动，风又奈何。","万物皆有裂痕，那是光照进来的地方。",
                        "深深扎根，高高伸展。"
                    ];
                    const box = document.createElement('div');
                    box.className = 'quote-box';
                    box.textContent = quotes[0];
                    container.appendChild(box);
                    const btn = document.createElement('button');
                    btn.textContent = '↻ 另一句';
                    btn.addEventListener('click', () => {
                        box.textContent = quotes[Math.floor(Math.random() * quotes.length)];
                    });
                    container.appendChild(btn);
                }
            });

            // 4 涂鸦板 (修复颜色跟随)
            cards.push({
                title: '✍️ 涂鸦 · 念',
                render: (container) => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 200; canvas.height = 120;
                    canvas.style.aspectRatio = '200/120';
                    container.appendChild(canvas);
                    const ctx = canvas.getContext('2d');
                    ctx.lineWidth = 2.5;
                    ctx.lineCap = 'round';
                    let drawing = false;

                    function getCoords(e) {
                        const rect = canvas.getBoundingClientRect();
                        const scaleX = canvas.width / rect.width;
                        const scaleY = canvas.height / rect.height;
                        let clientX, clientY;
                        if (e.touches) {
                            clientX = e.touches[0].clientX;
                            clientY = e.touches[0].clientY;
                        } else {
                            clientX = e.clientX;
                            clientY = e.clientY;
                        }
                        return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
                    }

                    canvas.addEventListener('mousedown', (e) => {
                        drawing = true;
                        const p = getCoords(e);
                        ctx.strokeStyle = currentBrushColor; // 使用最新颜色
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                    });
                    canvas.addEventListener('mousemove', (e) => {
                        if (!drawing) return;
                        const p = getCoords(e);
                        ctx.strokeStyle = currentBrushColor; // 确保颜色最新
                        ctx.lineTo(p.x, p.y);
                        ctx.stroke();
                    });
                    canvas.addEventListener('mouseup', () => drawing = false);
                    canvas.addEventListener('mouseleave', () => drawing = false);
                    canvas.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        drawing = true;
                        const p = getCoords(e);
                        ctx.strokeStyle = currentBrushColor;
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                    });
                    canvas.addEventListener('touchmove', (e) => {
                        e.preventDefault();
                        if (!drawing) return;
                        const p = getCoords(e);
                        ctx.strokeStyle = currentBrushColor;
                        ctx.lineTo(p.x, p.y);
                        ctx.stroke();
                    });
                    canvas.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        drawing = false;
                    });

                    const clearBtn = document.createElement('button');
                    clearBtn.textContent = '清除';
                    clearBtn.addEventListener('click', () => ctx.clearRect(0, 0, canvas.width, canvas.height));
                    container.appendChild(clearBtn);
                }
            });

            // 5 计数器 (修复长按重置)
            cards.push({
                title: '🧘 计数 · 定',
                render: (container) => {
                    const num = document.createElement('div');
                    num.className = 'counter-num';
                    num.textContent = '0';
                    container.appendChild(num);
                    let count = 0;
                    const incBtn = document.createElement('button');
                    incBtn.textContent = '+';
                    const decBtn = document.createElement('button');
                    decBtn.textContent = '–';
                    const hint = document.createElement('div');
                    hint.className = 'indicator';
                    hint.textContent = '长按「+」重置';

                    incBtn.addEventListener('click', () => { count++; num.textContent = count; });
                    decBtn.addEventListener('click', () => { count = Math.max(0, count-1); num.textContent = count; });

                    let timer;
                    incBtn.addEventListener('mousedown', () => { timer = setTimeout(() => { count = 0; num.textContent = count; hint.textContent = '✓ 已重置'; setTimeout(() => hint.textContent = '长按「+」重置', 1000); }, 800); });
                    incBtn.addEventListener('mouseup', () => clearTimeout(timer));
                    incBtn.addEventListener('mouseleave', () => clearTimeout(timer));
                    incBtn.addEventListener('touchstart', (e) => { e.preventDefault(); timer = setTimeout(() => { count = 0; num.textContent = count; hint.textContent = '✓ 已重置'; setTimeout(() => hint.textContent = '长按「+」重置', 1000); }, 800); });
                    incBtn.addEventListener('touchend', () => clearTimeout(timer));
                    incBtn.addEventListener('touchcancel', () => clearTimeout(timer));

                    const row = document.createElement('div');
                    row.className = 'flex-row';
                    row.appendChild(incBtn);
                    row.appendChild(decBtn);
                    container.appendChild(row);
                    container.appendChild(hint);
                }
            });

            // 6 波浪 (修复鼠标影响)
            cards.push({
                title: '🌊 涟漪 · 动',
                render: (container) => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 220; canvas.height = 100;
                    container.appendChild(canvas);
                    const ctx = canvas.getContext('2d');
                    let offset = 0, mouseInfl = 0;
                    canvas.addEventListener('mousemove', (e) => {
                        const rect = canvas.getBoundingClientRect();
                        if (e.clientX >= rect.left && e.clientX <= rect.right) {
                            const rel = (e.clientX - rect.left) / rect.width;
                            mouseInfl = rel * 2 - 1;
                        }
                    });
                    canvas.addEventListener('mouseleave', () => { mouseInfl = 0; });

                    function draw() {
                        ctx.clearRect(0,0,canvas.width,canvas.height);
                        for (let l=0; l<3; l++) {
                            ctx.beginPath();
                            ctx.strokeStyle = `rgba(200,180,255,${0.4-l*0.1})`;
                            ctx.lineWidth = 2 - l*0.5;
                            const baseY = canvas.height * (0.5 + l*0.15);
                            const amp = 8 + l*4;
                            const freq = 0.02 - l*0.002;
                            for (let x=0; x<=canvas.width; x+=5) {
                                let y = baseY + Math.sin(x*freq + offset + l*2 + mouseInfl*2) * amp + Math.cos(x*0.01 + offset*1.3 + mouseInfl)*3;
                                if (x===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
                            }
                            ctx.stroke();
                        }
                        offset += 0.1;
                        requestAnimationFrame(draw);
                    }
                    draw();
                }
            });

            // 7 心境罗盘
            cards.push({
                title: '🧭 心境 · 盘',
                render: (container) => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 140; canvas.height = 140;
                    canvas.className = 'mini-canvas';
                    container.appendChild(canvas);
                    const ctx = canvas.getContext('2d');
                    let mouseX = null, mouseY = null, angle = 0;
                    canvas.addEventListener('mousemove', (e) => {
                        const rect = canvas.getBoundingClientRect();
                        const scaleX = canvas.width/rect.width;
                        const scaleY = canvas.height/rect.height;
                        mouseX = (e.clientX - rect.left)*scaleX;
                        mouseY = (e.clientY - rect.top)*scaleY;
                    });
                    canvas.addEventListener('mouseleave', () => { mouseX=null; mouseY=null; });
                    function draw() {
                        ctx.clearRect(0,0,140,140);
                        const cx=70, cy=70;
                        ctx.beginPath();
                        ctx.arc(cx,cy,60,0,2*Math.PI);
                        ctx.strokeStyle = '#bba6e6';
                        ctx.lineWidth=2;
                        ctx.stroke();
                        for (let i=0;i<8;i++) {
                            let a = i*Math.PI/4;
                            let x1=cx+50*Math.cos(a), y1=cy+50*Math.sin(a);
                            let x2=cx+60*Math.cos(a), y2=cy+60*Math.sin(a);
                            ctx.beginPath();
                            ctx.moveTo(x1,y1); ctx.lineTo(x2,y2);
                            ctx.strokeStyle = '#a088cf';
                            ctx.stroke();
                        }
                        if (mouseX && mouseY) {
                            let dx = mouseX-cx, dy = mouseY-cy;
                            angle = Math.atan2(dy,dx);
                        } else {
                            angle += 0.005;
                        }
                        let px = cx+45*Math.cos(angle);
                        let py = cy+45*Math.sin(angle);
                        ctx.beginPath();
                        ctx.moveTo(cx,cy); ctx.lineTo(px,py);
                        ctx.strokeStyle = '#ffdab9';
                        ctx.lineWidth=3;
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.arc(cx,cy,5,0,2*Math.PI);
                        ctx.fillStyle = '#efe5ff';
                        ctx.shadowColor = '#b59eff';
                        ctx.shadowBlur=12;
                        ctx.fill();
                        ctx.shadowBlur=0;
                        requestAnimationFrame(draw);
                    }
                    draw();
                }
            });

            // 8 月相 (修复文字更新)
            cards.push({
                title: '🌙 月相 · 映',
                render: (container) => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 90; canvas.height = 90;
                    canvas.style.background = '#1b142b';
                    canvas.style.borderRadius = '50%';
                    container.appendChild(canvas);
                    const ctx = canvas.getContext('2d');
                    let phase = 0;
                    const label = document.createElement('div');
                    label.style.fontSize = '0.7rem';
                    label.textContent = '🌓 上弦';
                    container.appendChild(label);
                    const phases = ['🌑 新月','🌒 蛾眉','🌓 上弦','🌔 盈凸','🌕 满月','🌖 亏凸','🌗 下弦','🌘 残月'];
                    function draw() {
                        ctx.clearRect(0,0,90,90);
                        ctx.fillStyle = '#26203b';
                        ctx.beginPath();
                        ctx.arc(45,45,40,0,2*Math.PI);
                        ctx.fill();
                        ctx.save();
                        ctx.beginPath();
                        ctx.arc(45,45,38,0,2*Math.PI);
                        ctx.clip();
                        ctx.fillStyle = '#f5eac1';
                        ctx.beginPath();
                        ctx.arc(45 + Math.sin(phase)*25, 45, 38, 0, 2*Math.PI);
                        ctx.fill();
                        ctx.restore();
                        phase += 0.01;
                        let idx = Math.floor((phase % (2*Math.PI)) / (2*Math.PI) * 8);
                        label.textContent = phases[idx];
                        requestAnimationFrame(draw);
                    }
                    draw();
                }
            });

            // 9 心情温度
            cards.push({
                title: '🌡️ 心情 · 温度',
                render: (container) => {
                    const val = document.createElement('div');
                    val.className = 'counter-num';
                    val.style.fontSize = '2rem';
                    val.textContent = '50°';
                    container.appendChild(val);
                    const slider = document.createElement('input');
                    slider.type = 'range';
                    slider.className = 'slider';
                    slider.min = 0; slider.max = 100; slider.value = 50;
                    const emoji = document.createElement('div');
                    emoji.textContent = '😐';
                    slider.addEventListener('input', (e) => {
                        let v = e.target.value;
                        val.textContent = v + '°';
                        if (v < 30) emoji.textContent = '🥶';
                        else if (v < 60) emoji.textContent = '😐';
                        else emoji.textContent = '🥳';
                    });
                    container.appendChild(slider);
                    container.appendChild(emoji);
                }
            });

            // 10 内心钟
            cards.push({
                title: '⏰ 内心 · 钟',
                render: (container) => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 90; canvas.height = 90;
                    canvas.style.background = '#1e1935';
                    canvas.style.borderRadius = '50%';
                    container.appendChild(canvas);
                    const ctx = canvas.getContext('2d');
                    function draw() {
                        ctx.clearRect(0,0,90,90);
                        ctx.beginPath();
                        ctx.arc(45,45,40,0,2*Math.PI);
                        ctx.strokeStyle = '#bbaee6';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                        let now = new Date();
                        let h = now.getHours()%12, m = now.getMinutes(), s = now.getSeconds();
                        let ha = (h*30 + m*0.5)*Math.PI/180;
                        let ma = m*6*Math.PI/180;
                        ctx.beginPath();
                        ctx.moveTo(45,45);
                        ctx.lineTo(45+18*Math.sin(ha), 45-18*Math.cos(ha));
                        ctx.strokeStyle = '#c7b9ff';
                        ctx.lineWidth = 3;
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.moveTo(45,45);
                        ctx.lineTo(45+26*Math.sin(ma), 45-26*Math.cos(ma));
                        ctx.strokeStyle = '#dacbff';
                        ctx.lineWidth = 2;
                        ctx.stroke();
                        ctx.beginPath();
                        ctx.arc(45,45,3,0,2*Math.PI);
                        ctx.fillStyle = '#fff0d0';
                        ctx.fill();
                        requestAnimationFrame(draw);
                    }
                    draw();
                }
            });

            // 11 浮游词
            cards.push({
                title: '🕊️ 浮游 · 词',
                render: (container) => {
                    const word = document.createElement('div');
                    word.style.fontSize = '2rem';
                    word.style.fontWeight = '200';
                    word.textContent = '悟';
                    container.appendChild(word);
                    const btn = document.createElement('button');
                    btn.textContent = '↻ 换字';
                    btn.addEventListener('click', () => {
                        const words = ['悟','空','静','观','心','禅','寂','照','明','觉'];
                        word.textContent = words[Math.floor(Math.random()*words.length)];
                    });
                    container.appendChild(btn);
                }
            });

            // 12 禅石叠
            cards.push({
                title: '🪨 禅石 · 叠',
                render: (container) => {
                    const pile = document.createElement('div');
                    pile.className = 'flex-row';
                    let stones = 3;
                    function renderStones() {
                        pile.innerHTML = '';
                        for (let i=0; i<stones; i++) {
                            let s = document.createElement('div');
                            s.className = 'stone';
                            pile.appendChild(s);
                        }
                    }
                    renderStones();
                    container.appendChild(pile);
                    const add = document.createElement('button');
                    add.textContent = '+ 添石';
                    add.addEventListener('click', () => { if (stones < 18) stones++; renderStones(); });
                    const reset = document.createElement('button');
                    reset.textContent = '清零';
                    reset.addEventListener('click', () => { stones = 0; renderStones(); });
                    const row = document.createElement('div');
                    row.className = 'flex-row';
                    row.appendChild(add); row.appendChild(reset);
                    container.appendChild(row);
                }
            });

            // 13 灵感色码
            cards.push({
                title: '🎨 灵感 · 码',
                render: (container) => {
                    const preview = document.createElement('div');
                    preview.style.width = '50px';
                    preview.style.height = '50px';
                    preview.style.borderRadius = '15px';
                    preview.style.background = '#b49eff';
                    container.appendChild(preview);
                    const code = document.createElement('div');
                    code.className = 'color-code';
                    code.textContent = '#b49eff';
                    container.appendChild(code);
                    const btn = document.createElement('button');
                    btn.textContent = '随机';
                    btn.addEventListener('click', () => {
                        let col = randomColor();
                        preview.style.background = col;
                        code.textContent = col;
                    });
                    container.appendChild(btn);
                }
            });

            // 14 简笔形
            cards.push({
                title: '🔷 简笔 · 形',
                render: (container) => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 160; canvas.height = 70;
                    canvas.className = 'shape-canvas';
                    container.appendChild(canvas);
                    const ctx = canvas.getContext('2d');
                    function drawShape() {
                        ctx.clearRect(0,0,160,70);
                        ctx.fillStyle = '#b29eff';
                        let type = Math.floor(Math.random()*3);
                        if (type===0) ctx.fillRect(20,15,50,40);

                        ctx.fillStyle = '#e3c494';
                        ctx.beginPath();
                        ctx.arc(0,0,15,0,2*Math.PI);
                        ctx.fill();
                        ctx.restore();
                        rot += 0.01;
                        requestAnimationFrame(draw);
                    }
                    draw();
                }
            });

            // 将所有卡片渲染到网格
            cards.forEach(card => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                const titleDiv = document.createElement('div');
                titleDiv.className = 'card-title';
                titleDiv.textContent = card.title;
                cardDiv.appendChild(titleDiv);
                const contentDiv = document.createElement('div');
                contentDiv.className = 'card-content';
                card.render(contentDiv);
                cardDiv.appendChild(contentDiv);
                grid.appendChild(cardDiv);
            });

            // 注入呼吸灯关键帧
            const style = document.createElement('style');
            style.textContent = `
                @keyframes pulse {
                    0% { opacity: 0.5; transform: scale(0.9); }
                    50% { opacity: 1; transform: scale(1.1); }
                    100% { opacity: 0.5; transform: scale(0.9); }
                }
            `;
            document.head.appendChild(style);
        })();
    </script>
</body>
</html>
