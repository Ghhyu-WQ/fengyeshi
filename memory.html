<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>记忆翻牌 · Memory Match</title>
<style>
  :root{
    --bg:#07080f; --bg2:#0d1024;
    --card:rgba(255,255,255,.05); --line:rgba(255,255,255,.12);
    --text:#eef1ff; --muted:#9aa3c7;
    --brand:#7cfcff; --brand2:#b07aff; --good:#67e8a3;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:"PingFang SC","Microsoft YaHei",system-ui,sans-serif;
    color:var(--text);
    background:radial-gradient(1100px 600px at 15% -10%,rgba(124,252,255,.12),transparent 60%),
               radial-gradient(900px 500px at 110% 10%,rgba(176,122,255,.14),transparent 55%),
               linear-gradient(180deg,var(--bg),var(--bg2));
    min-height:100%;display:flex;flex-direction:column;align-items:center;
    padding:18px 14px 40px;
  }
  h1{font-size:clamp(22px,5vw,34px);margin-top:6px;
     background:linear-gradient(90deg,var(--brand),var(--brand2));
     -webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:var(--muted);font-size:13px;margin-top:6px}
  .stats{display:flex;gap:14px;margin:16px 0 10px;flex-wrap:wrap;justify-content:center}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:12px;
        padding:8px 14px;text-align:center;min-width:84px}
  .stat b{display:block;font-size:20px;font-family:ui-monospace,monospace}
  .stat span{font-size:11px;color:var(--muted)}
  .board{
    display:grid;grid-template-columns:repeat(4,72px);gap:10px;
    margin:6px auto 16px;
  }
  @media(max-width:420px){ .board{grid-template-columns:repeat(4,64px);gap:8px} }
  .card{
    width:72px;height:96px;perspective:600px;cursor:pointer;border:none;background:none;padding:0;
  }
  @media(max-width:420px){ .card{width:64px;height:86px} }
  .inner{position:relative;width:100%;height:100%;transition:transform .45s;transform-style:preserve-3d}
  .card.flipped .inner,.card.matched .inner{transform:rotateY(180deg)}
  .face{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    border-radius:12px;backface-visibility:hidden;font-size:34px;
    border:1px solid var(--line);
  }
  .front{background:linear-gradient(135deg,rgba(124,252,255,.18),rgba(176,122,255,.18));color:var(--muted)}
  .back{background:rgba(255,255,255,.07);transform:rotateY(180deg)}
  .card.matched .back{box-shadow:0 0 16px rgba(103,232,163,.5);border-color:rgba(103,232,163,.6)}
  .card:active .inner{transform:scale(.96)}
  .controls{display:flex;gap:10px;margin-top:4px}
  button.btn{
    padding:10px 18px;border-radius:999px;border:1px solid var(--line);
    background:linear-gradient(90deg,var(--brand),var(--brand2));color:#06121a;
    font-weight:700;cursor:pointer;font-size:14px;
  }
  button.btn.ghost{background:var(--card);color:var(--text)}
  .win{
    position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(5,6,15,.78);backdrop-filter:blur(4px);z-index:50;
  }
  .win.show{display:flex}
  .win .box{background:var(--bg2);border:1px solid var(--line);border-radius:18px;
    padding:28px 30px;text-align:center;max-width:320px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
  .win h2{font-size:24px;margin-bottom:8px}
  .win p{color:var(--muted);font-size:14px;margin-bottom:16px}
</style>
</head>
<body>
  <h1>🃏 记忆翻牌</h1>
  <div class="sub">翻开两张相同的牌即可消除，用最少步数通关！</div>

  <div class="stats">
    <div class="stat"><b id="moves">0</b><span>步数</span></div>
    <div class="stat"><b id="time">0:00</b><span>用时</span></div>
    <div class="stat"><b id="left">8</b><span>剩余</span></div>
  </div>

  <div class="board" id="board"></div>

  <div class="controls">
    <button class="btn" id="restart">重新开始</button>
    <button class="btn ghost" id="home">返回首页</button>
  </div>

  <div class="win" id="win">
    <div class="box">
      <h2>🎉 通关！</h2>
      <p id="winText"></p>
      <button class="btn" id="again">再来一局</button>
    </div>
  </div>

<script>
  const EMOJIS = ["🍎","🚀","🌟","🐱","🍔","⚡","🌈","🎵"];
  const board = document.getElementById('board');
  const movesEl = document.getElementById('moves');
  const timeEl = document.getElementById('time');
  const leftEl = document.getElementById('left');
  const winEl = document.getElementById('win');
  const winText = document.getElementById('winText');

  let deck = [], first = null, second = null, lock = false;
  let moves = 0, matched = 0, timer = null, seconds = 0;

  function shuffle(a){
    for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
    return a;
  }

  function startTimer(){
    if(timer) return;
    timer = setInterval(()=>{
      seconds++;
      const m = Math.floor(seconds/60), s = seconds%60;
      timeEl.textContent = m + ":" + String(s).padStart(2,"0");
    }, 1000);
  }
  function stopTimer(){ clearInterval(timer); timer = null; }

  function build(){
    stopTimer();
    deck = shuffle([...EMOJIS, ...EMOJIS]);
    board.innerHTML = "";
    first = second = null; lock = false;
    moves = 0; matched = 0; seconds = 0;
    movesEl.textContent = "0";
    timeEl.textContent = "0:00";
    leftEl.textContent = String(EMOJIS.length);
    winEl.classList.remove("show");

    deck.forEach((emoji, i) => {
      const card = document.createElement("button");
      card.className = "card";
      card.dataset.emoji = emoji;
      card.dataset.index = i;
      card.innerHTML =
        '<div class="inner"><div class="face front">?</div><div class="face back">'+emoji+'</div></div>';
      card.addEventListener("click", () => flip(card));
      board.appendChild(card);
    });
  }

  function flip(card){
    if(lock) return;
    if(card.classList.contains("flipped") || card.classList.contains("matched")) return;
    startTimer();
    card.classList.add("flipped");

    if(!first){ first = card; return; }
    if(card === first) return;

    second = card;
    lock = true;
    moves++;
    movesEl.textContent = String(moves);

    if(first.dataset.emoji === second.dataset.emoji){
      first.classList.add("matched");
      second.classList.add("matched");
      matched++;
      leftEl.textContent = String(EMOJIS.length - matched);
      first = second = null; lock = false;
      if(matched === EMOJIS.length) win();
    } else {
      setTimeout(() => {
        first.classList.remove("flipped");
        second.classList.remove("flipped");
        first = second = null; lock = false;
      }, 800);
    }
  }

  function win(){
    stopTimer();
    winText.textContent = "用了 " + moves + " 步，耗时 " + timeEl.textContent + "。";
    setTimeout(() => winEl.classList.add("show"), 400);
  }

  document.getElementById("restart").addEventListener("click", build);
  document.getElementById("again").addEventListener("click", build);
  document.getElementById("home").addEventListener("click", () => { window.location.href = "index.html"; });

  build();
</script>
</body>
</html>
