<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猜数字</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'PingFang SC','Microsoft YaHei',sans-serif; color:#eef1ff;
    background:linear-gradient(160deg,#07080f,#0d1024); min-height:100vh; display:flex; flex-direction:column;
    align-items:center; padding:18px; }
  .home { align-self:flex-start; color:#ffd055; font-size:14px; font-weight:700; padding:8px 14px;
    background:rgba(0,0,0,0.5); border:1px solid #ffd055; border-radius:8px; text-decoration:none; }
  h1 { font-size:22px; margin:8px 0 6px; }
  .sub { color:#9aa3c7; font-size:14px; margin-bottom:14px; }
  .panel { width:min(360px,92vw); background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.1);
    border-radius:16px; padding:22px; text-align:center; }
  .msg { min-height:24px; font-size:15px; margin-bottom:14px; color:#7cfcff; }
  .row { display:flex; gap:10px; justify-content:center; }
  input { width:120px; padding:11px 14px; border-radius:10px; border:1px solid rgba(124,252,255,0.3);
    background:#0a0d1e; color:#eef1ff; font-size:18px; text-align:center; outline:none; }
  .btn { padding:11px 20px; border-radius:10px; border:none; cursor:pointer; font-weight:700; font-size:15px;
    color:#06121a; background:linear-gradient(90deg,#7cfcff,#b07aff); }
  .stat { margin-top:14px; color:#9aa3c7; font-size:13px; }
  .log { margin-top:12px; max-height:120px; overflow:auto; font-size:13px; color:#9aa3c7; text-align:left; }
  .log div { padding:2px 0; border-bottom:1px dashed rgba(255,255,255,0.06); }
</style>
</head>
<body>
  <a class="home" href="index.html">返回首页</a>
  <h1>🔢 猜数字</h1>
  <div class="sub">我已想好 1–100 之间的一个整数，猜猜看？</div>
  <div class="panel">
    <div class="msg" id="msg">输入一个数字开始吧</div>
    <div class="row">
      <input id="guess" type="number" min="1" max="100" placeholder="1-100" />
      <button class="btn" id="go">猜！</button>
    </div>
    <div class="stat">已猜 <b id="cnt">0</b> 次</div>
    <div class="log" id="log"></div>
    <button class="btn" id="reset" style="margin-top:14px;">重新开始</button>
  </div>

<script>
(function () {
  const msg = document.getElementById('msg'), guess = document.getElementById('guess');
  const cntEl = document.getElementById('cnt'), log = document.getElementById('log');
  let ans, cnt;

  function reset(){
    ans = Math.floor(Math.random()*100)+1; cnt = 0; cntEl.textContent = 0;
    log.innerHTML = ''; msg.textContent = '输入一个数字开始吧'; msg.style.color = '#7cfcff';
    guess.value = '';
  }
  function go(){
    const v = parseInt(guess.value, 10);
    if (!v || v<1 || v>100){ msg.textContent = '请输入 1–100 之间的整数'; msg.style.color='#ff6b9d'; return; }
    cnt++; cntEl.textContent = cnt;
    let r;
    if (v === ans){ r = '🎉 猜对了！就是 ' + ans; msg.style.color='#67e8a3'; }
    else if (v < ans){ r = v + ' 小了，再大一点'; msg.style.color='#7cfcff'; }
    else { r = v + ' 大了，再小一点'; msg.style.color='#7cfcff'; }
    msg.textContent = r;
    const d = document.createElement('div'); d.textContent = '第'+cnt+'次：'+v+' → '+(v===ans?'正确':(v<ans?'偏小':'偏大'));
    log.prepend(d);
    guess.value = ''; guess.focus();
  }

  document.getElementById('go').addEventListener('click', go);
  guess.addEventListener('keydown', e=>{ if(e.key==='Enter') go(); });
  document.getElementById('reset').addEventListener('click', reset);
  reset();
})();
</script>
</body>
</html>
